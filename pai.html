<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pollinations AI // Workspace</title>
    <style>
        :root {
            --bg-app: #050507;
            --bg-sidebar: #0A0C12;
            --bg-main: #0E1016;
            --bg-card: #14161E;
            --border: #1E2028;
            --border-light: #2A2D3A;
            --text-main: #FFFFFF;
            --text-muted: #6B7280;
            --accent: #6366F1;
            --success: #10B981;
            --warning: #F59E0B;
            --danger: #EF4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        
        body { 
            background: var(--bg-app); 
            color: var(--text-main); 
            height: 100vh; 
            display: flex; 
            overflow: hidden;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 280px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
        }
        .logo { font-weight: 700; font-size: 1.1rem; display: flex; align-items: center; gap: 8px; margin-bottom: 15px; }
        .logo-dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 10px var(--accent); }
        
        .balance-pill {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .model-list-container {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }
        .model-list-container::-webkit-scrollbar { width: 4px; }
        .model-list-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .model-item {
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 4px;
            transition: all 0.2s;
            border: 1px solid transparent;
        }
        .model-item:hover { background: var(--bg-card); }
        .model-item.active { 
            background: var(--bg-card); 
            border-color: var(--accent);
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.1);
        }
        
        .model-name { font-weight: 500; font-size: 0.9rem; margin-bottom: 6px; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        /* Tags inside sidebar */
        .tags-wrapper { display: flex; gap: 4px; flex-wrap: wrap; }
        .tag { font-size: 0.6rem; padding: 2px 6px; border-radius: 4px; font-weight: 700; text-transform: uppercase; }
        .tag.search { background: rgba(99, 102, 241, 0.15); color: var(--accent); }
        .tag.tools { background: rgba(16, 185, 129, 0.15); color: var(--success); }
        .tag.reasoning { background: rgba(245, 158, 11, 0.15); color: var(--warning); }

        /* --- MAIN CONTENT --- */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-main);
            position: relative;
        }

        /* Stats Bar (Top) */
        .status-bar {
            height: 50px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            font-size: 0.8rem;
            color: var(--text-muted);
            background: rgba(0,0,0,0.2);
        }
        .stat-item { display: flex; align-items: center; gap: 6px; }
        .stat-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); }

        /* Chat Area */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
        }
        
        .response-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            min-height: 200px;
        }
        
        .console-text {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.9rem;
            line-height: 1.6;
            white-space: pre-wrap;
            color: var(--text-muted);
        }
        .cursor-blink::after { content: '▋'; color: var(--accent); animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* Input Area (Bottom) */
        .input-area {
            padding: 20px;
            border-top: 1px solid var(--border);
            background: var(--bg-main);
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
        }
        
        textarea {
            width: 100%; background: var(--bg-card); border: 1px solid var(--border); color: var(--text-main);
            padding: 16px; border-radius: 12px; font-size: 1rem; resize: none; height: 80px; outline: none;
            transition: border-color 0.2s;
        }
        textarea:focus { border-color: var(--accent); }

        .btn-row { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
        .btn-send {
            background: var(--accent); color: white; border: none; padding: 10px 20px;
            border-radius: 8px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px;
            transition: opacity 0.2s;
        }
        .btn-send:hover { opacity: 0.9; }
        .btn-send:disabled { opacity: 0.5; cursor: not-allowed; }

        .spinner { width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Login Overlay */
        .login-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(10px);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100;
        }
        .btn-login { background: white; color: black; padding: 14px 30px; border-radius: 30px; font-weight: 600; border: none; cursor: pointer; font-size: 1rem; margin-top: 20px; }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar { display: none; } /* Hide sidebar on mobile for now, could be a drawer */
            .main-content { width: 100%; }
        }
    </style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <div class="logo"><div class="logo-dot"></div>Pollinations</div>
        <div class="balance-pill">
            <span>Balance</span>
            <span id="ui-balance">...</span>
        </div>
    </div>
    <div class="model-list-container" id="model-list">
        <!-- Models injected here -->
        <div style="text-align:center; padding: 20px; color:var(--text-muted);">Loading models...</div>
    </div>
</div>

<!-- MAIN AREA -->
<div class="main-content">
    <div class="status-bar">
        <div class="stat-item">
            <div class="stat-dot"></div>
            <span id="status-text">Connected</span>
        </div>
        <div class="stat-item">
            Session Usage: <span id="ui-used" style="color: var(--warning); margin-left: 5px;">0</span> Pollen
        </div>
        <button class="btn-send" style="background: transparent; color: var(--text-muted); padding: 0; font-size: 0.8rem;" onclick="logout()">Logout</button>
    </div>

    <div class="chat-container">
        <div class="response-card">
            <div class="console-text" id="output-area" style="color: var(--text-muted)">
                <span style="opacity: 0.5">// Select a model from the sidebar to begin.</span>
            </div>
        </div>
    </div>

    <div class="input-area">
        <textarea id="prompt-input" placeholder="Type your prompt here..."></textarea>
        <div class="btn-row">
            <span style="font-size: 0.8rem; color: var(--text-muted);">Model: <span id="active-model-name" style="color:white;">None selected</span></span>
            <button id="gen-btn" class="btn-send" onclick="startGeneration()">
                <span>Send</span>
            </button>
        </div>
    </div>
</div>

<!-- LOGIN OVERLAY -->
<div class="login-overlay" id="login-screen" style="display: none;">
    <div style="font-size: 3rem;">🧬</div>
    <h1 style="font-weight: 700; margin-top: 10px;">Pollinations Workspace</h1>
    <p style="color: var(--text-muted);">Connect to access models and manage balance</p>
    <button class="btn-login" id="login-btn">Connect Account</button>
</div>

<script>
    // --- CONFIG ---
    const BASE_URL = "https://gen.pollinations.ai";
    const currentUrl = window.location.href.split('#')[0];
    const AUTH_URL = `https://enter.pollinations.ai/authorize?redirect_url=${encodeURIComponent(currentUrl)}&permissions=profile,balance,usage`;
    
    let STATE = { key: null, balance: 0, sessionCost: 0, models: [], selectedModel: null };

    // --- AUTH ---
    const hash = new URLSearchParams(window.location.hash.substring(1));
    const key = hash.get('api_key');
    
    if (key) {
        localStorage.setItem('pollen_key', key);
        window.history.replaceState({}, document.title, window.location.pathname);
        location.reload();
    } else {
        const storedKey = localStorage.getItem('pollen_key');
        if (storedKey) { STATE.key = storedKey; initApp(); } 
        else { showLogin(); }
    }

    function showLogin() {
        document.getElementById('login-screen').style.display = 'flex';
        document.getElementById('login-btn').onclick = () => window.location.href = AUTH_URL;
    }

    function logout() { localStorage.removeItem('pollen_key'); location.reload(); }

    // --- INIT ---
    async function initApp() {
        document.getElementById('login-screen').style.display = 'none';
        try {
            const [balanceRes, modelsRes] = await Promise.all([
                fetch(`${BASE_URL}/account/balance`, { headers: { 'Authorization': `Bearer ${STATE.key}` }}),
                fetch(`${BASE_URL}/text/models`)
            ]);

            if (balanceRes.ok) {
                const data = await balanceRes.json();
                STATE.balance = (typeof data === 'object' && data.balance !== undefined) ? data.balance : data;
                document.getElementById('ui-balance').innerText = STATE.balance.toLocaleString();
            }

            if (modelsRes.ok) {
                STATE.models = await modelsRes.json();
                renderSidebar();
            }
        } catch (e) { console.error(e); }
    }

    // --- RENDER SIDEBAR ---
    function renderSidebar() {
        const list = document.getElementById('model-list');
        list.innerHTML = '';

        STATE.models.forEach(m => {
            const displayName = m.description.split(' - ')[0];
            
            // Determine badges
            let tagsHtml = '';
            if (m.name.includes('search') || m.description.toLowerCase().includes('web search')) 
                tagsHtml += '<span class="tag search">Search</span>';
            if (m.tools) 
                tagsHtml += '<span class="tag tools">Tools</span>';
            if (m.reasoning) 
                tagsHtml += '<span class="tag reasoning">Think</span>';

            const item = document.createElement('div');
            item.className = 'model-item';
            item.dataset.id = m.name;
            item.onclick = () => selectModel(m.name, displayName);
            
            item.innerHTML = `
                <span class="model-name">${displayName}</span>
                <div class="tags-wrapper">${tagsHtml}</div>
            `;
            list.appendChild(item);
        });

        // Auto-select first model
        if (STATE.models.length > 0) {
            const firstName = STATE.models[0].name;
            const firstDisplay = STATE.models[0].description.split(' - ')[0];
            selectModel(firstName, firstDisplay);
        }
    }

    function selectModel(id, name) {
        STATE.selectedModel = id;
        
        // Update UI active state
        document.querySelectorAll('.model-item').forEach(el => {
            el.classList.remove('active');
            if (el.dataset.id === id) el.classList.add('active');
        });

        document.getElementById('active-model-name').innerText = name;
    }

    // --- GENERATION ---
    async function startGeneration() {
        const prompt = document.getElementById('prompt-input').value;
        const model = STATE.selectedModel;
        const output = document.getElementById('output-area');
        const btn = document.getElementById('gen-btn');

        if (!prompt || !model) { alert('Please select a model and type a prompt.'); return; }

        btn.disabled = true;
        btn.innerHTML = `<div class="spinner"></div>`;
        output.className = 'console-text cursor-blink';
        output.textContent = '';

        const startBalance = STATE.balance;

        try {
            const res = await fetch(`${BASE_URL}/v1/chat/completions`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${STATE.key}` },
                body: JSON.stringify({ model: model, messages: [{ role: 'user', content: prompt }], stream: true })
            });

            if (!res.ok) { throw new Error((await res.json()).error?.message || `Error ${res.status}`); }

            const reader = res.body.getReader();
            const decoder = new TextDecoder();
            let buffer = "";

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split("\n");
                buffer = lines.pop();
                for (const line of lines) {
                    if (line.startsWith("data: ")) {
                        const json = line.slice(6);
                        if (json === "[DONE]") continue;
                        try {
                            const data = JSON.parse(json);
                            if (data.choices?.[0]?.delta?.content) output.textContent += data.choices[0].delta.content;
                        } catch (e) {}
                    }
                }
            }
            
            output.className = 'console-text';
            updateBalance(startBalance);

        } catch (err) {
            output.innerHTML = `<span style="color: var(--danger)">[ERROR] ${err.message}</span>`;
            output.className = 'console-text';
        } finally {
            btn.disabled = false;
            btn.innerHTML = `<span>Send</span>`;
        }
    }

    async function updateBalance(prev) {
        try {
            const res = await fetch(`${BASE_URL}/account/balance`, { headers: { 'Authorization': `Bearer ${STATE.key}` }});
            if (res.ok) {
                const data = await res.json();
                STATE.balance = (typeof data === 'object' && data.balance !== undefined) ? data.balance : data;
                document.getElementById('ui-balance').innerText = STATE.balance.toLocaleString();
                
                const cost = prev - STATE.balance;
                if (cost > 0) {
                    STATE.sessionCost += cost;
                    document.getElementById('ui-used').innerText = STATE.sessionCost.toLocaleString();
                }
            }
        } catch(e) {}
    }
</script>
</body>
</html>
