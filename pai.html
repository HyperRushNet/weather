<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pollinations AI Text Gen</title>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --text-color: #e0e0e0;
            --accent-color: #d946ef; /* Magenta/Paars thema passend bij Pollinations */
            --card-bg: #1a1a1a;
            --input-bg: #262626;
            --border-color: #333;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background-color: var(--card-bg);
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6);
            width: 100%;
            max-width: 600px;
            border: 1px solid var(--border-color);
        }
        h1 {
            margin-top: 0;
            color: var(--accent-color);
            font-size: 1.8rem;
            text-align: center;
            margin-bottom: 1.5rem;
        }
        
        /* Loader animatie */
        .loader-container {
            text-align: center;
            padding: 40px;
        }
        .loader {
            border: 4px solid var(--input-bg);
            border-top: 4px solid var(--accent-color);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        input, textarea, select {
            width: 100%;
            padding: 14px;
            margin: 8px 0 16px 0;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background-color: var(--input-bg);
            color: var(--text-color);
            box-sizing: border-box;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input:focus, textarea:focus, select:focus {
            border-color: var(--accent-color);
            outline: none;
        }
        textarea {
            height: 140px;
            resize: vertical;
            font-family: inherit;
        }
        button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: transform 0.1s, background-color 0.3s;
            width: 100%;
        }
        button:hover { background-color: #c026d3; transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        button:disabled { background-color: #555; cursor: not-allowed; transform: none; }
        
        .output-box {
            margin-top: 20px;
            text-align: left;
            background: var(--input-bg);
            padding: 16px;
            border-radius: 8px;
            white-space: pre-wrap;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.95em;
            min-height: 100px;
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid var(--border-color);
        }
        .status-bar {
            display: flex;
            justify-content: space-between;
            font-size: 0.85em;
            color: #888;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
        }
        .status-dot {
            height: 8px;
            width: 8px;
            background-color: #4ade80;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
        }
        .link-btn {
            background: transparent;
            color: var(--accent-color);
            padding: 0;
            display: inline;
            font-size: 0.9em;
            cursor: pointer;
            text-decoration: underline;
        }
        .link-btn:hover { background: transparent; }
    </style>
</head>
<body>

<div class="container" id="app">
    <!-- Inhoud wordt hier dynamisch geladen -->
</div>

<script>
    // --- CONFIGURATIE (Gebaseerd op BYOP Docs) ---
    
    const BASE_URL = "https://gen.pollinations.ai";
    
    // STAP 1: De Authorize URL
    // Gebruikt 'location.href' als redirect_url zodat de gebruiker terugkomt op deze pagina.
    // De key komt terug in de URL hash: #api_key=sk_...
    const getAuthUrl = () => {
        const params = new URLSearchParams({
            redirect_url: location.href.split('#')[0], // Schoon adres zonder hash
            // Optioneel: Voeg hier je eigen publishable key (pk_) toe als je de app naam wilt laten zien.
            // app_key: 'pk_JOUW_KEY_HIER' 
        });
        return `https://enter.pollinations.ai/authorize?${params}`;
    };

    const appDiv = document.getElementById('app');

    // --- LOGICA ---

    // 1. Checken op API Key in URL Hash (#api_key=...)
    // Volgens docs: "user comes back with a key in the URL fragment"
    const hashParams = new URLSearchParams(window.location.hash.substring(1));
    const incomingKey = hashParams.get('api_key');

    if (incomingKey) {
        // Key gevonden! Opslaan in LocalStorage.
        localStorage.setItem('pollinations_api_key', incomingKey);
        // Hash verwijderen van URL voor privacy (zodat het niet in de historie staat)
        window.history.replaceState({}, document.title, window.location.pathname);
        // Pagina herladen om de key te activeren
        location.reload();
    } else {
        // 2. Checken of we al een opgeslagen key hebben
        const storedKey = localStorage.getItem('pollinations_api_key');

        if (!storedKey) {
            // Geen key -> Start de Auth Flow
            showAuthScreen();
        } else {
            // Key aanwezig -> Start de App
            showApp(storedKey);
        }
    }

    // --- FUNCTIES ---

    function showAuthScreen() {
        const authUrl = getAuthUrl();
        appDiv.innerHTML = `
            <h1>Welkom</h1>
            <p style="text-align:center; margin-bottom: 20px;">
                Om deze app te gebruiken, heb je een Pollinations API key nodig.<br>
                Klik op de knop om in te loggen of een key aan te maken.
            </p>
            <button onclick="window.location.href='${authUrl}'">
                Verbind met Pollinations
            </button>
            <p style="font-size: 0.8em; color: #666; text-align: center; margin-top: 15px;">
                Je wordt doorgestuurd naar een beveiligde login pagina.
            </p>
        `;
    }

    function showApp(key) {
        // Toon key status (eerste en laatste 4 tekens)
        const keyPreview = key.length > 8 
            ? `${key.substring(0, 4)}...${key.substring(key.length - 4)}` 
            : "Key geladen";

        appDiv.innerHTML = `
            <h1>AI Text Generator</h1>
            <div class="status-bar">
                <span><span class="status-dot"></span>Verbonden</span>
                <span>Key: ${keyPreview} 
                    <button class="link-btn" onclick="logout()" style="margin-left: 5px;">(Ontkoppelen)</button>
                </span>
            </div>
            
            <label for="modelSelect">Model</label>
            <select id="modelSelect">
                <option value="openai">OpenAI (GPT-5 Mini - Snel & Goedkoop)</option>
                <option value="openai-fast">OpenAI Fast (Nano - Snelste)</option>
                <option value="openai-large">OpenAI Large (GPT-5.2 - Krachtig)</option>
                <option value="mistral">Mistral Small 3.2</option>
                <option value="claude-fast">Claude Haiku 4.5</option>
                <option value="gemini-fast">Gemini 2.5 Flash Lite</option>
                <option value="deepseek">DeepSeek V3.2</option>
            </select>

            <label for="promptInput">Prompt</label>
            <textarea id="promptInput" placeholder="Typ hier je bericht..."></textarea>
            
            <button id="genBtn" onclick="generateText()">Genereer Tekst</button>
            
            <div class="output-box" id="output">De output verschijnt hier...</div>
        `;
    }

    function logout() {
        localStorage.removeItem('pollinations_api_key');
        location.reload();
    }

    async function generateText() {
        const key = localStorage.getItem('pollinations_api_key');
        const prompt = document.getElementById('promptInput').value;
        const model = document.getElementById('modelSelect').value;
        const outputDiv = document.getElementById('output');
        const btn = document.getElementById('genBtn');

        if (!prompt) {
            alert("Voer eerst een prompt in.");
            return;
        }

        // UI updaten (loading state)
        btn.disabled = true;
        btn.innerText = "Genereren...";
        outputDiv.innerText = "Wachten op AI...";

        try {
            // POST Request naar /v1/chat/completions
            const response = await fetch(`${BASE_URL}/v1/chat/completions`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${key}` // Auth header
                },
                body: JSON.stringify({
                    model: model,
                    messages: [
                        { role: "user", content: prompt }
                    ],
                    stream: false
                })
            });

            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.error?.message || `HTTP error ${response.status}`);
            }

            const data = await response.json();
            
            // Extract content uit OpenAI-formaat
            if (data.choices && data.choices.length > 0) {
                const content = data.choices[0].message.content;
                outputDiv.innerText = content;
            } else {
                outputDiv.innerText = "Geen output ontvangen.";
            }

        } catch (error) {
            console.error(error);
            outputDiv.innerText = `Fout: ${error.message}`;
            // Als key ongeldig is (401), automatisch uitloggen
            if (error.message.includes("401") || error.message.includes("Invalid")) {
                outputDiv.innerText += "\n\nSessie verlopen. Log opnieuw in...";
                setTimeout(logout, 2000);
            }
        } finally {
            btn.disabled = false;
            btn.innerText = "Genereer Tekst";
        }
    }
</script>

</body>
</html>
