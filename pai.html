<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gemini Pro Workspace</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #000000;
            --bg-surface: #0a0a0a;
            --bg-elevated: #141414;
            --border-subtle: rgba(255, 255, 255, 0.05);
            --border-default: rgba(255, 255, 255, 0.1);
            --text-primary: #ededed;
            --text-secondary: #a0a0a0;
            --accent-solid: #3b82f6;
            --radius-md: 12px;
            --sidebar-width: 280px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg-base); color: var(--text-primary); font-family: 'Inter', sans-serif; height: 100vh; display: flex; overflow: hidden; }

        /* --- SIDEBAR --- */
        .sidebar-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
            z-index: 100; opacity: 0; pointer-events: none; transition: 0.2s;
        }
        body.sidebar-open .sidebar-overlay { opacity: 1; pointer-events: auto; }

        .sidebar {
            width: var(--sidebar-width); background: var(--bg-surface); border-right: 1px solid var(--border-subtle);
            display: flex; flex-direction: column; padding: 16px; gap: 16px;
            position: fixed; height: 100%; z-index: 101; transform: translateX(-100%); transition: transform 0.25s ease;
        }

        @media (min-width: 1024px) {
            .sidebar { position: relative; transform: translateX(0); }
            .sidebar-overlay { display: none; }
        }
        body.sidebar-open .sidebar { transform: translateX(0); }

        .new-chat-btn {
            display: flex; align-items: center; justify-content: center; gap: 10px; padding: 12px; 
            background: var(--bg-elevated); border: 1px solid var(--border-default); 
            border-radius: var(--radius-md); color: #fff; cursor: pointer; transition: 0.2s;
        }
        .new-chat-btn:hover { background: #1a1a1a; }

        .chat-list { flex: 1; overflow-y: auto; }
        .chat-item {
            padding: 10px 12px; border-radius: 8px; font-size: 14px; color: var(--text-secondary);
            cursor: pointer; display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px;
        }
        .chat-item:hover, .chat-item.active { background: var(--bg-elevated); color: #fff; }

        /* --- MAIN --- */
        .main { flex: 1; display: flex; flex-direction: column; position: relative; min-width: 0; }
        
        .header {
            padding: 14px 20px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border-subtle); background: rgba(0,0,0,0.6); backdrop-filter: blur(15px); z-index: 10;
        }
        .menu-toggle { background: none; border: none; color: #fff; cursor: pointer; padding: 5px; }
        @media (min-width: 1024px) { .menu-toggle { display: none; } }

        .chat-view { flex: 1; overflow-y: auto; padding: 20px; }
        .chat-container { max-width: 800px; margin: 0 auto; padding-bottom: 120px; }

        .message { width: 100%; margin-top: 24px; }
        .message.user { display: flex; flex-direction: column; align-items: flex-end; }
        .message.user .bubble {
            background: var(--bg-elevated); padding: 12px 16px; border-radius: 18px 18px 4px 18px;
            max-width: 85%; font-size: 15px; border: 1px solid var(--border-default);
        }
        .markdown-body { font-size: 15px; line-height: 1.6; }

        /* --- INPUT --- */
        .input-area { position: absolute; bottom: 0; left: 0; right: 0; padding: 20px; background: linear-gradient(transparent, var(--bg-base) 50%); }
        .input-box {
            max-width: 800px; margin: 0 auto; background: var(--bg-surface); border: 1px solid var(--border-default);
            border-radius: 24px; display: flex; align-items: flex-end; padding: 10px 16px; gap: 10px;
        }
        textarea {
            flex: 1; background: transparent; border: none; color: #fff; font-family: inherit;
            font-size: 16px; resize: none; outline: none; max-height: 150px; padding: 8px 0;
        }
        .send-btn { 
            width: 36px; height: 36px; border-radius: 50%; border: none; background: #fff; 
            cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }

        .loader { display: flex; gap: 4px; padding: 10px 0; }
        .loader span { width: 6px; height: 6px; background: var(--accent-solid); border-radius: 50%; animation: bounce 1.4s infinite ease-in-out; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
    </style>
</head>
<body>

<div class="sidebar-overlay" onclick="toggleSidebar(false)"></div>

<div class="sidebar" id="sidebar">
    <div style="font-size: 11px; font-weight: 700; color: #444; letter-spacing: 1px; margin-bottom: 10px;">GESCHIEDENIS</div>
    <button class="new-chat-btn" onclick="newChat(); toggleSidebar(false);">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
        Nieuwe Chat
    </button>
    <div class="chat-list" id="chat-list"></div>
</div>

<div class="main">
    <div class="header">
        <div style="display: flex; align-items: center; gap: 12px;">
            <button class="menu-toggle" onclick="toggleSidebar(true)">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </button>
            <div style="font-weight: 600; font-size: 14px;">Gemini Pro</div>
        </div>
        <div id="ui-balance" style="font-family: 'JetBrains Mono'; font-size: 11px; color: var(--text-secondary);">... pollen</div>
    </div>

    <div id="welcome-view" style="flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px;">
        <h1 style="font-size: 32px; font-weight: 700; margin-bottom: 10px;">Hoe kan ik helpen?</h1>
        <p id="random-subtitle" style="color: var(--text-secondary); font-size: 14px; font-style: italic;"></p>
    </div>

    <div id="chat-view" class="chat-view" style="display:none;">
        <div class="chat-container" id="chat-container"></div>
    </div>

    <div class="input-area">
        <div class="input-box">
            <textarea id="prompt" placeholder="Stuur een bericht..." rows="1"></textarea>
            <button class="send-btn" onclick="handleSend()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="black"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </div>
    </div>
</div>

<script>
    const BASE = "https://gen.pollinations.ai";
    let CURRENT_CHAT_ID = null;
    let CHATS = JSON.parse(localStorage.getItem('gemini_chats') || '[]');
    let API_KEY = localStorage.getItem('pk');

    const subtitles = [
        "Vandaag is een prima dag om iets nieuws te ontdekken.",
        "De koffie staat virtueel klaar.",
        "Laten we kijken wat we kunnen bouwen.",
        "Soms is het antwoord simpeler dan de vraag.",
        "Klaar voor de volgende grote ingeving?",
        "Typ maar raak, ik luister (nou ja, ik lees)."
    ];

    function toggleSidebar(open) {
        document.body.classList.toggle('sidebar-open', open);
    }

    async function init() {
        if (!API_KEY) {
            const k = new URLSearchParams(window.location.hash.substring(1)).get('api_key');
            if (k) { localStorage.setItem('pk', k); window.location.hash = ''; location.reload(); }
            else { window.location.href = `https://enter.pollinations.ai/authorize?redirect_url=${encodeURIComponent(window.location.href)}&permissions=profile,balance,usage`; return; }
        }
        
        document.getElementById('random-subtitle').innerText = subtitles[Math.floor(Math.random() * subtitles.length)];
        
        renderSidebar();
        updateBalance();
        
        document.getElementById('prompt').addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = this.scrollHeight + 'px';
        });
    }

    async function updateBalance() {
        try {
            const r = await fetch(`${BASE}/account/balance`, { headers: { 'Authorization': `Bearer ${API_KEY}` } });
            const d = await r.json();
            const v = (typeof d === 'object') ? (d.balance ?? 0) : parseFloat(d);
            document.getElementById('ui-balance').innerText = Math.floor(v).toLocaleString('nl-NL') + ' pollen';
        } catch (e) {}
    }

    function renderSidebar() {
        const list = document.getElementById('chat-list');
        list.innerHTML = '';
        CHATS.forEach(c => {
            const item = document.createElement('div');
            item.className = `chat-item ${c.id === CURRENT_CHAT_ID ? 'active' : ''}`;
            item.onclick = () => { loadChat(c.id); if(window.innerWidth < 1024) toggleSidebar(false); };
            item.innerHTML = `<span style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${c.title}</span>`;
            list.appendChild(item);
        });
    }

    function loadChat(id) {
        CURRENT_CHAT_ID = id;
        const chat = CHATS.find(x => x.id === id);
        document.getElementById('welcome-view').style.display = 'none';
        document.getElementById('chat-view').style.display = 'block';
        document.getElementById('chat-container').innerHTML = '';
        chat.messages.forEach(m => renderMessage(m.role, m.content));
        renderSidebar();
    }

    function newChat() {
        CURRENT_CHAT_ID = null;
        document.getElementById('welcome-view').style.display = 'flex';
        document.getElementById('chat-view').style.display = 'none';
        document.getElementById('chat-container').innerHTML = '';
        document.getElementById('prompt').value = '';
        renderSidebar();
    }

    function renderMessage(role, content) {
        const isUser = role === 'user';
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${isUser ? 'user' : 'ai'}`;
        msgDiv.innerHTML = isUser 
            ? `<div class="bubble">${content.replace(/</g, "&lt;")}</div>`
            : `<div class="markdown-body">${marked.parse(content)}</div>`;
        document.getElementById('chat-container').appendChild(msgDiv);
        document.getElementById('chat-view').scrollTop = document.getElementById('chat-view').scrollHeight;
        return msgDiv;
    }

    async function handleSend() {
        const input = document.getElementById('prompt');
        const text = input.value.trim();
        if (!text) return;
        input.value = '';
        input.style.height = 'auto';

        if (!CURRENT_CHAT_ID) {
            CURRENT_CHAT_ID = Date.now().toString();
            CHATS.unshift({ id: CURRENT_CHAT_ID, title: text.substring(0, 35), messages: [] });
            document.getElementById('welcome-view').style.display = 'none';
            document.getElementById('chat-view').style.display = 'block';
            renderSidebar();
        }

        const chat = CHATS.find(x => x.id === CURRENT_CHAT_ID);
        chat.messages.push({ role: 'user', content: text });
        renderMessage('user', text);
        
        const aiMsgDiv = renderMessage('assistant', '<div class="loader"><span></span><span></span><span></span></div>');
        const container = aiMsgDiv.querySelector('.markdown-body') || aiMsgDiv;

        try {
            const response = await fetch(`${BASE}/v1/chat/completions`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEY}` },
                body: JSON.stringify({ model: "gemini-search", messages: chat.messages, stream: true })
            });

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let fullText = "";

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                const chunk = decoder.decode(value);
                const lines = chunk.split('\n');
                for (const line of lines) {
                    if (line.trim().startsWith('data: ')) {
                        const data = line.trim().slice(6);
                        if (data === '[DONE]') break;
                        try {
                            const json = JSON.parse(data);
                            const content = json.choices[0].delta?.content;
                            if (content) {
                                fullText += content;
                                container.innerHTML = marked.parse(fullText);
                                document.getElementById('chat-view').scrollTop = document.getElementById('chat-view').scrollHeight;
                            }
                        } catch (e) {}
                    }
                }
            }
            chat.messages.push({ role: 'assistant', content: fullText });
            localStorage.setItem('gemini_chats', JSON.stringify(CHATS));
            updateBalance();
        } catch (e) {
            container.innerHTML = `<span style="color:red">Fout: ${e.message}</span>`;
        }
    }

    init();
</script>
</body>
</html>
