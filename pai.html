<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pollinations AI + Credits</title>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --text-color: #e0e0e0;
            --accent-color: #d946ef;
            --search-color: #22d3ee;
            --card-bg: #1a1a1a;
            --input-bg: #262626;
            --border-color: #333;
            --success-color: #4ade80;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background-color: var(--card-bg);
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6);
            width: 100%;
            max-width: 700px;
            border: 1px solid var(--border-color);
        }
        h1 {
            margin-top: 0;
            color: var(--accent-color);
            font-size: 1.8rem;
            text-align: center;
            margin-bottom: 0.5rem;
        }
        
        /* Status Panel Styling */
        .status-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--input-bg);
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
        }
        .status-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 0.9em;
        }
        .status-label { color: #888; font-size: 0.8em; margin-bottom: 4px; }
        .status-value { font-weight: bold; color: var(--success-color); font-size: 1.1em; }
        .status-key { font-family: monospace; color: #aaa; font-size: 0.8em; }
        .logout-btn { 
            background: transparent; color: #f87171; border: 1px solid #f87171; 
            padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 0.8em;
            width: auto;
        }
        .logout-btn:hover { background: rgba(248, 113, 113, 0.1); }

        input, textarea, select {
            width: 100%;
            padding: 14px;
            margin: 8px 0 16px 0;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background-color: var(--input-bg);
            color: var(--text-color);
            box-sizing: border-box;
            font-size: 16px;
        }
        input:focus, textarea:focus, select:focus { border-color: var(--accent-color); outline: none; }
        textarea { height: 100px; resize: vertical; font-family: inherit; }
        
        button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
        button:disabled { background-color: #444; cursor: not-allowed; color: #aaa; }
        
        .output-box {
            margin-top: 20px;
            text-align: left;
            background: var(--input-bg);
            padding: 18px;
            border-radius: 8px;
            white-space: pre-wrap;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.95em;
            min-height: 100px;
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            line-height: 1.6;
        }
    </style>
</head>
<body>

<div class="container" id="app"></div>

<script>
    // --- CONFIGURATIE ---
    const BASE_URL = "https://gen.pollinations.ai";
    const currentUrl = window.location.href.split('#')[0];
    
    // We voegen 'permissions=profile,balance,usage' toe om de credits te kunnen lezen
    const AUTH_URL = `https://enter.pollinations.ai/authorize?redirect_url=${encodeURIComponent(currentUrl)}&permissions=profile,balance,usage`;
    
    const appDiv = document.getElementById('app');
    let currentKey = null; // Huidige key opslaan in variabele

    // --- AUTH LOGICA ---
    const hashParams = new URLSearchParams(window.location.hash.substring(1));
    const incomingKey = hashParams.get('api_key');

    if (incomingKey) {
        localStorage.setItem('pollinations_api_key', incomingKey);
        window.history.replaceState({}, document.title, window.location.pathname);
        location.reload();
    } else {
        const storedKey = localStorage.getItem('pollinations_api_key');
        currentKey = storedKey;
        if (!storedKey) { showAuthScreen(); } else { initApp(storedKey); }
    }

    // --- FUNCTIES ---
    function showAuthScreen() {
        appDiv.innerHTML = `
            <h1>Start</h1>
            <p style="text-align:center; margin-bottom: 20px; color:#ccc;">
                Log in om je saldo te zien en AI te gebruiken.
            </p>
            <button onclick="window.location.href='${AUTH_URL}'">Verbind met Pollinations</button>
        `;
    }

    // Initialiseer app en haal direct saldo op
    async function initApp(key) {
        showAppSkeleton(key);
        await fetchBalance(); // Haal saldo op bij start
    }

    function showAppSkeleton(key) {
        const keyPreview = key.length > 8 ? `${key.substring(0, 4)}...${key.substring(key.length - 4)}` : "...";
        appDiv.innerHTML = `
            <h1>AI Dashboard</h1>
            
            <!-- STATUS PANEL -->
            <div class="status-panel">
                <div class="status-item">
                    <span class="status-label">Saldo (Pollen)</span>
                    <span class="status-value" id="balanceDisplay">...</span>
                </div>
                <div class="status-item">
                    <span class="status-label">API Key</span>
                    <span class="status-key">${keyPreview}</span>
                </div>
                <div class="status-item">
                    <button class="logout-btn" onclick="logout()">Ontkoppel</button>
                </div>
            </div>

            <label for="modelSelect">Model</label>
            <select id="modelSelect">
                <option value="gemini-search">Gemini 2.5 Flash (Web Search) 🌐</option>
                <option value="perplexity-fast">Perplexity Sonar (Web Search) 🌐</option>
                <option value="openai">OpenAI (GPT-5 Mini)</option>
                <option value="openai-fast">OpenAI Fast (Nano)</option>
                <option value="mistral">Mistral Small 3.2</option>
            </select>

            <label for="promptInput">Prompt</label>
            <textarea id="promptInput" placeholder="Typ je vraag..."></textarea>
            
            <button id="genBtn" onclick="startStream()">Genereer</button>
            
            <div class="output-box" id="output">Wachten op input...</div>
        `;
    }

    // Functie om saldo op te halen
    async function fetchBalance() {
        const balanceEl = document.getElementById('balanceDisplay');
        if (!balanceEl) return;

        try {
            const res = await fetch(`${BASE_URL}/account/balance`, {
                headers: { 'Authorization': `Bearer ${currentKey}` }
            });

            if (res.ok) {
                const data = await res.json();
                // Het API antwoord kan een object zijn {balance: 100} of direct een nummer
                // We vangen beide af
                const amount = (typeof data === 'object' && data.balance !== undefined) ? data.balance : data;
                balanceEl.innerText = amount.toLocaleString();
                
                // Kleur aanpassen als laag
                if (amount < 100) balanceEl.style.color = "#f87171"; 
                else balanceEl.style.color = "#4ade80";
            } else {
                balanceEl.innerText = "Error";
                balanceEl.style.color = "#f87171";
            }
        } catch (e) {
            console.error("Kon saldo niet ophalen", e);
            balanceEl.innerText = "---";
        }
    }

    function logout() {
        localStorage.removeItem('pollinations_api_key');
        location.reload();
    }

    // --- STREAMING LOGICA ---
    async function startStream() {
        const prompt = document.getElementById('promptInput').value;
        const model = document.getElementById('modelSelect').value;
        const outputDiv = document.getElementById('output');
        const btn = document.getElementById('genBtn');

        if (!prompt) { alert("Vul eerst een prompt in."); return; }

        btn.disabled = true;
        btn.innerText = "Bezig...";
        outputDiv.textContent = ""; 
        
        try {
            const response = await fetch(`${BASE_URL}/v1/chat/completions`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${currentKey}`
                },
                body: JSON.stringify({
                    model: model,
                    messages: [{ role: "user", content: prompt }],
                    stream: true
                })
            });

            if (!response.ok) {
                const errData = await response.json();
                throw new Error(errData.error?.message || `Server error ${response.status}`);
            }

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = "";

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split("\n");
                buffer = lines.pop(); 

                for (const line of lines) {
                    if (line.startsWith("data: ")) {
                        const data = line.slice(6);
                        if (data === "[DONE]") continue;
                        try {
                            const json = JSON.parse(data);
                            const content = json.choices?.[0]?.delta?.content;
                            if (content) {
                                outputDiv.textContent += content;
                                outputDiv.scrollTop = outputDiv.scrollHeight;
                            }
                        } catch (e) { /* Ignore */ }
                    }
                }
            }

        } catch (error) {
            console.error("Error:", error);
            outputDiv.textContent = `Fout: ${error.message}`;
            if (error.message.includes("402")) {
                outputDiv.textContent += "\n\n❌ SALDO TE LAAG. Koop meer pollen.";
                document.getElementById('balanceDisplay').innerText = "0";
                document.getElementById('balanceDisplay').style.color = "#f87171";
            }
        } finally {
            btn.disabled = false;
            btn.innerText = "Genereer";
            // VERVERS SALDO NA ELKE GENERATIE
            fetchBalance(); 
        }
    }
</script>
</body>
</html>
