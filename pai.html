<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Pro Workspace</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-base: #000000;
            --bg-surface: #0a0a0a;
            --bg-elevated: #141414;
            --border-subtle: rgba(255, 255, 255, 0.05);
            --border-default: rgba(255, 255, 255, 0.1);
            --text-primary: #ededed;
            --text-secondary: #a0a0a0;
            --text-tertiary: #555555;
            --accent-solid: #3b82f6;
            --font-ui: 'Inter', sans-serif;
            --font-code: 'JetBrains Mono', monospace;
            --radius-md: 12px;
            --radius-lg: 20px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg-base); color: var(--text-primary); font-family: var(--font-ui); height: 100vh; display: flex; overflow: hidden; }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 280px; background: var(--bg-surface); border-right: 1px solid var(--border-subtle);
            display: flex; flex-direction: column; padding: 16px; gap: 16px; transition: transform 0.3s ease;
        }
        .sidebar-header { font-size: 11px; font-weight: 700; color: var(--text-tertiary); letter-spacing: 1px; padding-left: 4px; }
        .new-chat-btn {
            display: flex; align-items: center; justify-content: center; gap: 10px; padding: 14px; background: var(--bg-elevated);
            border: 1px solid var(--border-default); border-radius: var(--radius-md); color: var(--text-primary);
            cursor: pointer; font-size: 14px; transition: 0.2s; font-weight: 500;
        }
        .new-chat-btn:hover { background: #1f1f1f; border-color: #333; }
        .chat-list { flex: 1; overflow-y: auto; margin-top: 10px; }
        .chat-item {
            padding: 12px; border-radius: 8px; font-size: 14px; color: var(--text-secondary);
            cursor: pointer; display: flex; justify-content: space-between; align-items: center; margin-bottom: 2px;
        }
        .chat-item:hover, .chat-item.active { background: var(--bg-elevated); color: #fff; }
        .delete-btn { opacity: 0; background: none; border: none; color: var(--text-tertiary); cursor: pointer; font-size: 16px; display: flex; align-items: center; }
        .chat-item:hover .delete-btn { opacity: 1; }

        /* --- MAIN --- */
        .main { flex: 1; display: flex; flex-direction: column; position: relative; }
        .header {
            padding: 16px 32px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border-subtle); background: rgba(0,0,0,0.4); backdrop-filter: blur(10px); z-index: 10;
        }
        .header-title { font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .status-dot { width: 7px; height: 7px; background: #10b981; border-radius: 50%; }
        .wallet-badge { font-family: var(--font-code); font-size: 11px; color: var(--text-secondary); background: var(--bg-elevated); padding: 4px 10px; border-radius: 6px; }

        /* --- CHAT AREA --- */
        .chat-view { flex: 1; overflow-y: auto; padding: 20px; scroll-behavior: smooth; }
        .chat-container { max-width: 800px; margin: 0 auto; padding-bottom: 140px; }

        /* Berichten */
        .message { margin-bottom: 12px; width: 100%; }
        .message.user { display: flex; flex-direction: column; align-items: flex-end; margin-top: 32px; }
        .message.user .bubble {
            background: var(--bg-elevated); border: 1px solid var(--border-default);
            padding: 14px 20px; border-radius: 20px 20px 4px 20px; max-width: 85%; font-size: 15px; line-height: 1.5;
        }
        
        .message.ai { margin-top: 12px; width: 100%; }
        .message-separator {
            border: none; border-top: 1px solid var(--border-subtle); margin: 45px 0 25px 0; width: 100%;
        }

        /* Markdown & HR Fixes */
        .markdown-body { line-height: 1.7; font-size: 15px; color: var(--text-primary); }
        .markdown-body p { margin-bottom: 18px; }
        .markdown-body hr { border: none; border-top: 1px solid var(--border-default); margin: 24px 0; }
        .markdown-body h1, .markdown-body h2 { margin: 28px 0 14px 0; font-weight: 600; color: #fff; }
        .markdown-body ul, .markdown-body ol { margin-bottom: 18px; padding-left: 22px; }
        .markdown-body li { margin-bottom: 8px; }
        .markdown-body code { font-family: var(--font-code); background: #222; padding: 2px 6px; border-radius: 4px; color: #f472b6; font-size: 13px; }
        .markdown-body pre { background: #0d0d0d; padding: 18px; border-radius: 12px; border: 1px solid #1a1a1a; margin: 24px 0; overflow-x: auto; }
        .markdown-body pre code { background: none; color: #e5e5e5; padding: 0; }

        /* --- INPUT --- */
        .input-area { position: absolute; bottom: 0; left: 0; right: 0; padding: 24px 24px 32px 24px; background: linear-gradient(transparent, var(--bg-base) 50%); }
        .input-box {
            max-width: 800px; margin: 0 auto; background: var(--bg-surface); border: 1px solid var(--border-default);
            border-radius: var(--radius-lg); display: flex; align-items: center; padding: 10px 16px; gap: 12px; transition: border-color 0.2s;
        }
        .input-box:focus-within { border-color: #333; }
        
        textarea {
            flex: 1; background: transparent; border: none; color: #fff; font-family: var(--font-ui);
            font-size: 15px; resize: none; outline: none; max-height: 180px; padding: 8px 0; 
            display: flex; align-items: center; line-height: 1.5;
        }
        
        .send-btn {
            width: 36px; height: 36px; border-radius: 50%; border: none; background: #fff; 
            cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: transform 0.2s;
        }
        .send-btn:hover { transform: scale(1.08); }

        /* Welcome View */
        .welcome-view { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; text-align: center; }
        .welcome-view h1 { font-size: 40px; margin-bottom: 12px; font-weight: 700; letter-spacing: -1px; background: linear-gradient(#fff, #888); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .welcome-view p { color: var(--text-secondary); margin-bottom: 40px; font-size: 16px; }
        
        .suggestion-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px; width: 100%; max-width: 800px; }
        .suggestion-card {
            background: var(--bg-surface); border: 1px solid var(--border-subtle); padding: 20px;
            border-radius: 14px; cursor: pointer; transition: 0.2s; text-align: left;
        }
        .suggestion-card:hover { border-color: var(--accent-solid); background: var(--bg-elevated); transform: translateY(-2px); }
        .suggestion-card h3 { font-size: 14px; margin-bottom: 6px; color: #fff; }
        .suggestion-card p { font-size: 13px; color: var(--text-tertiary); margin: 0; }

        /* Loader */
        .loader { display: flex; gap: 5px; padding: 12px 0; }
        .loader span { width: 7px; height: 7px; background: var(--accent-solid); border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; }
        .loader span:nth-child(1) { animation-delay: -0.32s; }
        .loader span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
    </style>
</head>
<body>

<div class="sidebar" id="sidebar">
    <div class="sidebar-header">WORKSPACE</div>
    <button class="new-chat-btn" onclick="newChat()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
        Nieuwe Chat
    </button>
    <div class="chat-list" id="chat-list"></div>
</div>

<div class="main">
    <div class="header">
        <div class="header-title">Gemini Pro <span class="status-dot"></span></div>
        <div class="wallet-badge" id="ui-balance">... pollen</div>
    </div>

    <div id="welcome-view" class="welcome-view">
        <h1>Hoe kan ik helpen?</h1>
        <p>Kies een suggestie of stel direct je vraag.</p>
        <div class="suggestion-grid">
            <div class="suggestion-card" onclick="setPrompt('Schrijf een modern CV voor een software developer')">
                <h3>Carrière</h3>
                <p>Schrijf een modern CV voor een software developer</p>
            </div>
            <div class="suggestion-card" onclick="setPrompt('Leg blockchain uit aan een 10-jarige')">
                <h3>Concept</h3>
                <p>Leg blockchain uit aan een 10-jarige</p>
            </div>
            <div class="suggestion-card" onclick="setPrompt('Genereer Python code voor een web scraper')">
                <h3>Code</h3>
                <p>Genereer Python code voor een web scraper</p>
            </div>
        </div>
    </div>

    <div id="chat-view" class="chat-view" style="display:none;">
        <div class="chat-container" id="chat-container"></div>
    </div>

    <div class="input-area">
        <div class="input-box">
            <textarea id="prompt" placeholder="Stuur een bericht..." rows="1"></textarea>
            <button class="send-btn" id="send-btn" onclick="handleSend()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="black"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </div>
    </div>
</div>

<script>
    const BASE = "https://gen.pollinations.ai";
    let CURRENT_CHAT_ID = null;
    let CHATS = JSON.parse(localStorage.getItem('gemini_chats') || '[]');
    let API_KEY = localStorage.getItem('pk');

    const promptInput = document.getElementById('prompt');
    const chatContainer = document.getElementById('chat-container');
    const welcomeView = document.getElementById('welcome-view');
    const chatView = document.getElementById('chat-view');

    async function init() {
        if (!API_KEY) {
            const k = new URLSearchParams(window.location.hash.substring(1)).get('api_key');
            if (k) { localStorage.setItem('pk', k); window.location.hash = ''; location.reload(); }
            else { window.location.href = `https://enter.pollinations.ai/authorize?redirect_url=${encodeURIComponent(window.location.href)}&permissions=profile,balance,usage`; return; }
        }
        renderSidebar();
        updateBalance();
        
        promptInput.addEventListener('input', () => {
            promptInput.style.height = 'auto';
            promptInput.style.height = (promptInput.scrollHeight) + 'px';
        });

        promptInput.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        });
    }

    async function updateBalance() {
        try {
            const r = await fetch(`${BASE}/account/balance`, { headers: { 'Authorization': `Bearer ${API_KEY}` } });
            const d = await r.json();
            const v = (typeof d === 'object') ? (d.balance ?? 0) : parseFloat(d);
            document.getElementById('ui-balance').innerText = v.toLocaleString('nl-NL') + ' pollen';
        } catch (e) {}
    }

    function renderSidebar() {
        const list = document.getElementById('chat-list');
        list.innerHTML = '';
        CHATS.forEach(c => {
            const item = document.createElement('div');
            item.className = `chat-item ${c.id === CURRENT_CHAT_ID ? 'active' : ''}`;
            item.innerHTML = `<span onclick="loadChat('${c.id}')" style="flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${c.title}</span>
                              <button class="delete-btn" onclick="deleteChat(event, '${c.id}')">×</button>`;
            list.appendChild(item);
        });
    }

    function loadChat(id) {
        CURRENT_CHAT_ID = id;
        const chat = CHATS.find(x => x.id === id);
        welcomeView.style.display = 'none';
        chatView.style.display = 'block';
        chatContainer.innerHTML = '';
        chat.messages.forEach(m => renderMessage(m.role, m.content));
        renderSidebar();
    }

    function newChat() {
        CURRENT_CHAT_ID = null;
        welcomeView.style.display = 'flex';
        chatView.style.display = 'none';
        chatContainer.innerHTML = '';
        promptInput.value = '';
        promptInput.style.height = 'auto';
        renderSidebar();
    }

    function deleteChat(e, id) {
        e.stopPropagation();
        CHATS = CHATS.filter(c => c.id !== id);
        localStorage.setItem('gemini_chats', JSON.stringify(CHATS));
        if (CURRENT_CHAT_ID === id) newChat(); else renderSidebar();
    }

    function setPrompt(t) { 
        promptInput.value = t; 
        promptInput.focus(); 
        promptInput.dispatchEvent(new Event('input')); 
    }

    function renderMessage(role, content) {
        const isUser = role === 'user';
        
        if (isUser && chatContainer.children.length > 0) {
            const hr = document.createElement('hr');
            hr.className = 'message-separator';
            chatContainer.appendChild(hr);
        }

        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${isUser ? 'user' : 'ai'}`;
        
        if (isUser) {
            msgDiv.innerHTML = `<div class="bubble">${content.replace(/&/g, "&amp;").replace(/</g, "&lt;")}</div>`;
        } else {
            msgDiv.innerHTML = `<div class="markdown-body">${marked.parse(content)}</div>`;
        }
        
        chatContainer.appendChild(msgDiv);
        chatView.scrollTop = chatView.scrollHeight;
        return msgDiv;
    }

    async function handleSend() {
        const text = promptInput.value.trim();
        if (!text) return;
        promptInput.value = ''; 
        promptInput.style.height = 'auto';

        if (!CURRENT_CHAT_ID) {
            CURRENT_CHAT_ID = Date.now().toString();
            CHATS.unshift({ id: CURRENT_CHAT_ID, title: text.substring(0, 30) + "...", messages: [] });
            welcomeView.style.display = 'none'; 
            chatView.style.display = 'block';
        }

        const chat = CHATS.find(x => x.id === CURRENT_CHAT_ID);
        chat.messages.push({ role: 'user', content: text });
        renderMessage('user', text);
        
        const aiMsgDiv = renderMessage('assistant', '<div class="loader"><span></span><span></span><span></span></div>');
        
        try {
            const response = await fetch(`${BASE}/v1/chat/completions`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEY}` },
                body: JSON.stringify({ model: "gemini-search", messages: chat.messages, stream: true })
            });

            const reader = response.body.getReader();
            let fullText = "";
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                const chunk = new TextDecoder().decode(value);
                const lines = chunk.split('\n');
                for (const line of lines) {
                    if (line.startsWith('data: ')) {
                        const data = line.slice(6);
                        if (data === '[DONE]') continue;
                        try {
                            const json = JSON.parse(data);
                            const content = json.choices[0].delta.content;
                            if (content) {
                                fullText += content;
                                aiMsgDiv.querySelector('.markdown-body').innerHTML = marked.parse(fullText);
                                chatView.scrollTop = chatView.scrollHeight;
                            }
                        } catch (e) {}
                    }
                }
            }
            chat.messages.push({ role: 'assistant', content: fullText });
            localStorage.setItem('gemini_chats', JSON.stringify(CHATS));
            updateBalance();
        } catch (e) { aiMsgDiv.innerHTML = "Fout bij verbinding."; }
    }

    init();
</script>
</body>
</html>
