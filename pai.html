<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #131314;
            --txt-primary: #e3e3e3;
            --txt-secondary: #c4c7c5;
            --input-bg: #1e1f20;
            --accent: #8ab4f8;
            --border: #444746;
            --success: #4ade80;
            --warning: #facc15;
        }

        /* Custom Scrollbars */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #3c3d3f; border-radius: 10px; border: 2px solid var(--bg-color); }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg-color);
            color: var(--txt-primary);
            font-family: 'Google Sans', Roboto, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        .header {
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }
        .logo { font-size: 22px; font-weight: 500; display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .logo span { background: linear-gradient(45deg, #4285f4, #9b72cb, #d96570); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 700; }
        
        .wallet-info { display: flex; gap: 20px; align-items: center; }
        .stat-item { font-size: 12px; display: flex; flex-direction: column; align-items: flex-end; }
        .stat-label { font-size: 9px; text-transform: uppercase; color: var(--txt-secondary); opacity: 0.8; }
        .val-balance { color: var(--success); font-weight: 500; }
        .val-used { color: var(--warning); }

        /* Main View (Gemini Home) */
        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: all 0.4s ease;
        }
        .welcome-text {
            font-size: 40px;
            font-weight: 500;
            margin-bottom: 40px;
            background: linear-gradient(to right, #4285f4, #9b72cb, #d96570);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        /* Chat View (Actieve Chat) */
        .chat-view {
            display: none;
            flex: 1;
            overflow-y: auto;
            width: 100%;
            padding: 20px;
        }
        .chat-content {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 32px;
            padding-bottom: 150px;
        }

        /* Messages */
        .message { width: 100%; display: flex; flex-direction: column; }
        .user-msg { align-self: flex-end; background: #2b2c2f; padding: 14px 22px; border-radius: 24px; max-width: 80%; }
        .ai-msg { align-self: flex-start; line-height: 1.7; font-size: 16px; }
        .ai-msg pre { background: #000; padding: 16px; border-radius: 12px; margin: 12px 0; overflow-x: auto; border: 1px solid var(--border); }

        /* Input Area (Gemini Style) */
        .input-wrapper {
            position: fixed;
            bottom: 0;
            width: 100%;
            padding: 0 24px 32px;
            background: linear-gradient(transparent, var(--bg-color) 30%);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .input-box {
            width: 100%;
            max-width: 760px;
            background: var(--input-bg);
            border-radius: 28px;
            padding: 12px 24px;
            display: flex;
            align-items: flex-end;
            gap: 12px;
            transition: background 0.2s;
        }
        .input-box:focus-within { background: #282a2d; }
        
        textarea {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            font-size: 16px;
            padding: 8px 0;
            resize: none;
            max-height: 200px;
            font-family: inherit;
        }

        .send-btn { background: none; border: none; color: var(--accent); cursor: pointer; padding: 8px; transition: 0.2s; }
        .send-btn:disabled { opacity: 0.3; }

        /* Helper Classes */
        .hidden { display: none !important; }
        .dots { display: flex; gap: 4px; padding: 10px 0; }
        .dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: pulse 1.4s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.3; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.1); } }
    </style>
</head>
<body>

<div class="header">
    <div class="logo" onclick="location.reload()"><span>◉</span> Gemini</div>
    <div class="wallet-info">
        <div class="stat-item">
            <span class="stat-label">Sessie</span>
            <span id="ui-used" class="val-used">0,00</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">Saldo</span>
            <span id="ui-balance" class="val-balance">...</span>
        </div>
    </div>
</div>

<div id="home-view" class="main-container">
    <h1 class="welcome-text">Hoe kan ik je vandaag helpen?</h1>
</div>

<div id="chat-view" class="chat-view">
    <div id="chat-content" class="chat-content"></div>
</div>

<div class="input-wrapper">
    <div class="input-box">
        <textarea id="prompt" placeholder="Stel een vraag aan Gemini..." rows="1"></textarea>
        <button class="send-btn" id="send-btn" onclick="generate()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
    </div>
    <p style="font-size: 11px; color: var(--txt-secondary); margin-top: 12px; opacity: 0.6;">
        Gemini kan onjuiste informatie geven, controleer belangrijke antwoorden.
    </p>
</div>

<script>
    const BASE = "https://gen.pollinations.ai";
    const GREETING = "Hallo! Ik ben Gemini. Hoe kan ik je vandaag helpen?";
    let STATE = { 
        key: localStorage.getItem('pk'), 
        balance: 0, 
        used: 0, 
        history: [{ role: "assistant", content: GREETING }], // Bot ziet nu zijn eigen begroeting
        isChatActive: false 
    };

    function init() {
        if (!STATE.key) {
            const key = new URLSearchParams(window.location.hash.substring(1)).get('api_key');
            if (key) { localStorage.setItem('pk', key); window.location.hash = ''; location.reload(); }
            else { window.location.href = `https://enter.pollinations.ai/authorize?redirect_url=${encodeURIComponent(window.location.href.split('#')[0])}&permissions=profile,balance,usage`; return; }
        }
        updateStatus();
        
        const ta = document.getElementById('prompt');
        ta.addEventListener('input', function() { this.style.height = 'auto'; this.style.height = this.scrollHeight + 'px'; });
        ta.addEventListener('keydown', e => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); generate(); } });
    }

    async function updateStatus() {
        try {
            const res = await fetch(`${BASE}/account/balance`, { headers: { 'Authorization': `Bearer ${STATE.key}` }});
            const d = await res.json();
            const newVal = (typeof d === 'object' && d !== null) ? (d.balance ?? 0) : (parseFloat(d) || 0);
            if (STATE.balance > 0 && newVal < STATE.balance) STATE.used += (STATE.balance - newVal);
            STATE.balance = newVal;
            const fmt = { minimumFractionDigits: 2, maximumFractionDigits: 2 };
            document.getElementById('ui-balance').innerText = STATE.balance.toLocaleString('nl-NL', fmt);
            document.getElementById('ui-used').innerText = STATE.used.toLocaleString('nl-NL', fmt);
        } catch(e) {}
    }

    function switchToChat() {
        if (STATE.isChatActive) return;
        document.getElementById('home-view').style.display = 'none';
        const chatView = document.getElementById('chat-view');
        chatView.style.display = 'block';
        
        // Render het eerste bericht van de bot in de UI
        const content = document.getElementById('chat-content');
        content.innerHTML = `<div class="message ai-msg">${marked.parse(GREETING)}</div>`;
        
        STATE.isChatActive = true;
    }

    async function generate() {
        const input = document.getElementById('prompt');
        const text = input.value.trim();
        if (!text) return;

        switchToChat();

        const content = document.getElementById('chat-content');
        const scrollBox = document.getElementById('chat-view');
        
        content.innerHTML += `<div class="message user-msg">${text}</div>`;
        STATE.history.push({ role: "user", content: text });
        
        input.value = '';
        input.style.height = 'auto';
        document.getElementById('send-btn').disabled = true;

        const aiDiv = document.createElement('div');
        aiDiv.className = 'message ai-msg';
        aiDiv.innerHTML = '<div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
        content.appendChild(aiDiv);
        scrollBox.scrollTop = scrollBox.scrollHeight;

        try {
            const res = await fetch(`${BASE}/v1/chat/completions`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${STATE.key}` },
                body: JSON.stringify({ model: "gemini-fast", messages: STATE.history, stream: true })
            });

            const reader = res.body.getReader();
            const decoder = new TextDecoder();
            let full = "";
            aiDiv.innerHTML = "";

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                const chunk = decoder.decode(value);
                const lines = chunk.split('\n');
                for (const line of lines) {
                    if (line.startsWith('data: ')) {
                        const data = line.slice(6);
                        if (data === '[DONE]') continue;
                        try {
                            const json = JSON.parse(data);
                            full += json.choices[0].delta.content || "";
                            aiDiv.innerHTML = marked.parse(full);
                            scrollBox.scrollTop = scrollBox.scrollHeight;
                        } catch(e) {}
                    }
                }
            }
            STATE.history.push({ role: "assistant", content: full });
            updateStatus();
        } catch (e) { aiDiv.innerHTML = "Fout bij verbinding."; }
        finally { document.getElementById('send-btn').disabled = false; }
    }

    init();
</script>

</body>
</html>
