<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Workspace</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #131314;
            --txt-primary: #e3e3e3;
            --txt-secondary: #c4c7c5;
            --input-bg: #1e1f20;
            --accent: #8ab4f8;
            --border: #444746;
            --sb-thumb: #3c3d3f;
            --sb-hover: #48494b;
        }

        /* --- CUSTOM SCROLLBARS --- */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--sb-thumb); border-radius: 10px; border: 2px solid var(--bg-color); }
        ::-webkit-scrollbar-thumb:hover { background: var(--sb-hover); }
        
        /* Voor Firefox */
        * { scrollbar-width: thin; scrollbar-color: var(--sb-thumb) transparent; }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color);
            color: var(--txt-primary);
            font-family: 'Google Sans', Roboto, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Top Bar */
        .header {
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }
        .logo { font-size: 20px; font-weight: 500; display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .logo span { background: linear-gradient(45deg, #4285f4, #9b72cb, #d96570); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 700; }
        .stats { font-size: 13px; color: var(--txt-secondary); background: rgba(255,255,255,0.05); padding: 4px 12px; border-radius: 12px; }

        /* Main Chat Area */
        .chat-wrapper {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        #chat-content {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 32px;
            padding-bottom: 120px;
        }

        .message { display: flex; flex-direction: column; gap: 8px; }
        .user-msg { 
            align-self: flex-end; 
            background: #2b2c2f; 
            padding: 14px 22px; 
            border-radius: 24px; 
            max-width: 85%;
            font-size: 15px;
            line-height: 1.5;
        }
        .ai-msg { align-self: flex-start; line-height: 1.7; font-size: 16px; width: 100%; }
        
        /* Markdown Style Fixes */
        .ai-msg p { margin-bottom: 12px; }
        .ai-msg code { background: #282a2d; padding: 3px 6px; border-radius: 6px; font-family: 'Roboto Mono', monospace; font-size: 0.9em; color: var(--accent); }
        .ai-msg pre { 
            background: #0e0e0e; 
            padding: 20px; 
            border-radius: 16px; 
            overflow-x: auto; 
            margin: 16px 0; 
            border: 1px solid var(--border); 
        }

        /* Input Bar */
        .input-container {
            position: fixed;
            bottom: 0;
            width: 100%;
            padding: 24px 24px 40px 24px;
            background: linear-gradient(transparent, var(--bg-color) 40%);
            display: flex;
            justify-content: center;
        }
        .input-box {
            width: 100%;
            max-width: 800px;
            background: var(--input-bg);
            border-radius: 28px;
            padding: 10px 20px;
            display: flex;
            align-items: flex-end;
            gap: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        
        textarea {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            font-size: 16px;
            padding: 12px 4px;
            resize: none;
            max-height: 200px;
            font-family: inherit;
        }

        .send-btn {
            background: none;
            border: none;
            color: var(--accent);
            cursor: pointer;
            padding: 10px;
            border-radius: 50%;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .send-btn:hover:not(:disabled) { background: rgba(138, 180, 248, 0.1); }
        .send-btn:disabled { opacity: 0.3; cursor: default; }

        #login-overlay {
            position: fixed; inset: 0; background: var(--bg-color); z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .loading-dots { padding: 10px; display: flex; gap: 6px; }
        .dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: pulse 1.2s infinite ease-in-out; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes pulse { 0%, 100% { opacity: 0.2; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.1); } }
    </style>
</head>
<body>

<div id="login-overlay" style="display: none;">
    <h1 style="margin-bottom: 32px; font-weight: 500;">Gemini <span>◉</span></h1>
    <button onclick="login()" style="background: var(--accent); color: #000; border: none; padding: 14px 32px; border-radius: 28px; font-weight: 600; cursor: pointer; font-size: 16px;">
        Verbinden met Pollinations
    </button>
</div>

<div class="header">
    <div class="logo" onclick="location.reload()"><span>◉</span> Gemini</div>
    <div class="stats" id="ui-info">Saldo bijwerken...</div>
</div>

<div class="chat-wrapper" id="scroll-target">
    <div id="chat-content">
        <div class="ai-msg">Hallo! Ik ben je persoonlijke Gemini assistent. Hoe kan ik je vandaag helpen?</div>
    </div>
</div>

<div class="input-container">
    <div class="input-box">
        <textarea id="prompt" placeholder="Stel een vraag..." rows="1"></textarea>
        <button class="send-btn" id="send-btn" onclick="generate()" title="Verstuur">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
    </div>
</div>

<script>
    const MODEL = "gemini-fast"; 
    const BASE = "https://gen.pollinations.ai";
    let STATE = { key: localStorage.getItem('pk'), history: [] };

    function init() {
        if (!STATE.key) {
            const hash = new URLSearchParams(window.location.hash.substring(1));
            const key = hash.get('api_key');
            if (key) {
                localStorage.setItem('pk', key);
                window.location.hash = '';
                location.reload();
            } else {
                document.getElementById('login-overlay').style.display = 'flex';
                return;
            }
        }
        updateStatus();
        
        const ta = document.getElementById('prompt');
        ta.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        // Enter = send, Shift+Enter = new line
        ta.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                generate();
            }
        });
    }

    async function updateStatus() {
        try {
            const res = await fetch(`${BASE}/account/balance`, { 
                headers: { 'Authorization': `Bearer ${STATE.key}` }
            });
            if (!res.ok) throw new Error();
            const d = await res.json();
            
            // Fix voor verschillende API response formats
            const balance = (typeof d === 'object' && d !== null) ? (d.balance ?? 0) : d;
            
            document.getElementById('ui-info').innerText = `${Math.floor(balance).toLocaleString()} pollen`;
        } catch(e) { 
            document.getElementById('ui-info').innerText = "Verbonden"; 
        }
    }

    async function generate() {
        const input = document.getElementById('prompt');
        const btn = document.getElementById('send-btn');
        const container = document.getElementById('chat-content');
        const scrollTarget = document.getElementById('scroll-target');
        const text = input.value.trim();

        if (!text || btn.disabled) return;

        // User Message
        container.innerHTML += `<div class="message user-msg">${text}</div>`;
        STATE.history.push({ role: "user", content: text });
        
        input.value = '';
        input.style.height = 'auto';
        btn.disabled = true;

        // AI Placeholder
        const aiMsgDiv = document.createElement('div');
        aiMsgDiv.className = 'message ai-msg';
        aiMsgDiv.innerHTML = '<div class="loading-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
        container.appendChild(aiMsgDiv);
        scrollTarget.scrollTop = scrollTarget.scrollHeight;

        try {
            const res = await fetch(`${BASE}/v1/chat/completions`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${STATE.key}` },
                body: JSON.stringify({
                    model: MODEL,
                    messages: STATE.history,
                    stream: true
                })
            });

            const reader = res.body.getReader();
            const decoder = new TextDecoder();
            let fullText = "";
            aiMsgDiv.innerHTML = ""; 

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                
                const chunk = decoder.decode(value);
                const lines = chunk.split('\n');
                
                for (const line of lines) {
                    if (line.startsWith('data: ')) {
                        const data = line.slice(6);
                        if (data === '[DONE]') continue;
                        try {
                            const json = JSON.parse(data);
                            const content = json.choices[0].delta.content || "";
                            fullText += content;
                            aiMsgDiv.innerHTML = marked.parse(fullText);
                            scrollTarget.scrollTop = scrollTarget.scrollHeight;
                        } catch(e) {}
                    }
                }
            }
            STATE.history.push({ role: "assistant", content: fullText });
            updateStatus();
        } catch (e) {
            aiMsgDiv.innerHTML = `<span style="color:#f28b82">Fout bij ophalen van antwoord. Controleer je verbinding.</span>`;
        } finally {
            btn.disabled = false;
        }
    }

    function login() {
        window.location.href = `https://enter.pollinations.ai/authorize?redirect_url=${encodeURIComponent(window.location.href)}&permissions=profile,balance,usage`;
    }

    init();
</script>

</body>
</html>
