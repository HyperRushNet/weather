<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pollinations Workspace</title>
    <style>
        :root {
            --bg-body: #0f0f11;
            --bg-sidebar: #18181b;
            --bg-active: #27272a;
            --bg-input: #18181b;
            --bg-chat: #0f0f11;
            --text-primary: #fafafa;
            --text-secondary: #a1a1aa;
            --text-muted: #71717a;
            --accent: #818cf8;
            --accent-soft: rgba(129, 140, 248, 0.1);
            --success: #4ade80;
            --warning: #facc15;
            --border: rgba(255, 255, 255, 0.05);
            --scrollbar-bg: #27272a;
            --scrollbar-thumb: #3f3f46;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif; }

        body {
            background: var(--bg-body);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 260px;
            background: var(--bg-sidebar);
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
            flex-shrink: 0;
        }

        .brand {
            padding: 20px;
            border-bottom: 1px solid var(--border);
        }
        .brand h1 { font-size: 1rem; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .brand h1 span { color: var(--accent); }
        
        .wallet {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
        }
        .wallet-label { color: var(--text-muted); }
        .wallet-value { font-weight: 600; color: var(--success); font-variant-numeric: tabular-nums; }

        .models-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        /* Custom Scrollbar Sidebar */
        .models-list::-webkit-scrollbar { width: 4px; }
        .models-list::-webkit-scrollbar-track { background: transparent; }
        .models-list::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 2px; }

        .model-item {
            padding: 10px 12px;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 2px;
            transition: background 0.15s;
            border: 1px solid transparent;
        }
        .model-item:hover { background: var(--bg-active); }
        .model-item.selected {
            background: var(--bg-active);
            border-color: var(--accent);
        }

        .model-name {
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 4px;
            display: block;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .model-tags { display: flex; gap: 4px; }
        
        .tag {
            font-size: 0.6rem;
            padding: 2px 5px;
            border-radius: 4px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-muted);
            background: rgba(255,255,255,0.05);
        }
        .tag.search { background: var(--accent-soft); color: var(--accent); }
        .tag.tools { background: rgba(74, 222, 128, 0.1); color: var(--success); }
        .tag.reasoning { background: rgba(250, 204, 21, 0.1); color: var(--warning); }

        /* --- MAIN --- */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-chat);
            position: relative;
        }

        .top-bar {
            height: 50px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            font-size: 0.8rem;
            color: var(--text-muted);
            background: rgba(0,0,0,0.1);
            flex-shrink: 0;
        }
        .status-group { display: flex; align-items: center; gap: 15px; }
        .btn-logout { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 0.8rem; }
        .btn-logout:hover { color: var(--text-primary); }

        /* Chat Area */
        .chat-container {
            flex: 1;
            overflow-y: auto; /* Container scrollt niet meer, box scrollt */
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* Belangrijk voor als content kort is */
        }
        
        .chat-box {
            width: 100%;
            max-width: 800px;
            background: var(--bg-sidebar);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 30px;
            min-height: 200px;
            max-height: 60vh; /* Maximale hoogte 60% van het scherm */
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            
            /* Scroll instellingen */
            overflow-y: auto; 
            overflow-x: hidden;
        }

        /* Custom Scrollbar Chat Box */
        .chat-box::-webkit-scrollbar {
            width: 8px;
        }
        .chat-box::-webkit-scrollbar-track {
            background: transparent; 
            border-radius: 4px;
        }
        .chat-box::-webkit-scrollbar-thumb {
            background: var(--scrollbar-thumb); 
            border-radius: 4px;
            border: 2px solid var(--bg-sidebar); /* Ruimte rondom thumb */
        }
        .chat-box::-webkit-scrollbar-thumb:hover {
            background: #52525b;
        }

        .output-text {
            font-size: 0.95rem;
            line-height: 1.7;
            color: var(--text-secondary);
            white-space: pre-wrap;
            font-family: 'Inter', sans-serif;
        }
        .cursor::after { content: '▋'; color: var(--accent); animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* Input Area */
        .input-area {
            padding: 20px 40px 40px;
            display: flex;
            justify-content: center;
            flex-shrink: 0;
        }
        .input-wrapper {
            width: 100%;
            max-width: 800px;
            background: var(--bg-sidebar);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        textarea {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 1rem;
            resize: none;
            height: 60px;
            outline: none;
            line-height: 1.5;
        }
        
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .model-info { font-size: 0.8rem; color: var(--text-muted); }
        .model-info strong { color: var(--text-primary); font-weight: 500; }

        .btn-send {
            background: var(--text-primary);
            color: var(--bg-body);
            border: none;
            padding: 8px 20px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .btn-send:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-send:disabled { opacity: 0.5; transform: none; cursor: not-allowed; background: var(--text-muted); }

        .spinner { width: 14px; height: 14px; border: 2px solid rgba(0,0,0,0.2); border-top-color: black; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Login */
        .login-screen {
            position: fixed; inset: 0; background: var(--bg-body);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100;
        }
        .login-card { text-align: center; }
        .login-title { font-size: 1.5rem; margin-bottom: 10px; }
        .login-sub { color: var(--text-muted); margin-bottom: 30px; }
        .btn-login { background: var(--text-primary); color: var(--bg-body); padding: 12px 30px; border-radius: 8px; font-weight: 600; border: none; cursor: pointer; }
    </style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="brand">
        <h1><span>◉</span> Pollinations</h1>
    </div>
    <div class="wallet">
        <span class="wallet-label">Balance</span>
        <span class="wallet-value" id="ui-balance">...</span>
    </div>
    <div class="models-list" id="models-container">
        <div style="padding: 20px; text-align: center; color: var(--text-muted); font-size: 0.8rem;">Loading models...</div>
    </div>
</div>

<!-- MAIN -->
<div class="main">
    <div class="top-bar">
        <div class="status-group">
            <span>Session Usage: <span id="ui-used" style="color: var(--warning);">0</span> pollen</span>
        </div>
        <button class="btn-logout" onclick="logout()">Logout</button>
    </div>

    <div class="chat-container">
        <div class="chat-box" id="chat-box">
            <div class="output-text" id="output">Select a model and start typing...</div>
        </div>
    </div>

    <div class="input-area">
        <div class="input-wrapper">
            <textarea id="prompt" placeholder="Type your message..."></textarea>
            <div class="controls">
                <div class="model-info">Model: <strong id="selected-name">None</strong></div>
                <button class="btn-send" id="send-btn" onclick="generate()">
                    Send
                </button>
            </div>
        </div>
    </div>
</div>

<!-- LOGIN -->
<div class="login-screen" id="login" style="display: none;">
    <div class="login-card">
        <div class="login-title">Workspace</div>
        <p class="login-sub">Connect your account to continue.</p>
        <button class="btn-login" onclick="login()">Connect Account</button>
    </div>
</div>

<script>
    const BASE = "https://gen.pollinations.ai";
    const REDIRECT = window.location.href.split('#')[0];
    const AUTH = `https://enter.pollinations.ai/authorize?redirect_url=${encodeURIComponent(REDIRECT)}&permissions=profile,balance,usage`;

    let STATE = { key: null, balance: 0, used: 0, models: [], current: null };

    // Auth Flow
    const hash = new URLSearchParams(window.location.hash.substring(1));
    const key = hash.get('api_key');
    
    if (key) {
        localStorage.setItem('pk', key);
        window.history.replaceState({}, document.title, window.location.pathname);
        location.reload();
    } else {
        const saved = localStorage.getItem('pk');
        if (saved) { STATE.key = saved; init(); } 
        else { document.getElementById('login').style.display = 'flex'; }
    }

    function login() { window.location.href = AUTH; }
    function logout() { localStorage.removeItem('pk'); location.reload(); }

    // Init
    async function init() {
        document.getElementById('login').style.display = 'none';
        try {
            const [bRes, mRes] = await Promise.all([
                fetch(`${BASE}/account/balance`, { headers: { 'Authorization': `Bearer ${STATE.key}` }}),
                fetch(`${BASE}/text/models`)
            ]);

            if (bRes.ok) {
                const d = await bRes.json();
                STATE.balance = (typeof d === 'object' && d.balance !== undefined) ? d.balance : d;
                document.getElementById('ui-balance').innerText = STATE.balance.toLocaleString();
            }

            if (mRes.ok) {
                STATE.models = await mRes.json();
                renderModels();
            }
        } catch(e) { console.error(e); }
    }

    // Render Models
    function renderModels() {
        const c = document.getElementById('models-container');
        c.innerHTML = '';

        // Sort: Search models first
        STATE.models.sort((a, b) => {
            const aS = (a.name.includes('search') || a.description.toLowerCase().includes('search')) ? -1 : 1;
            const bS = (b.name.includes('search') || b.description.toLowerCase().includes('search')) ? -1 : 1;
            return aS - bS;
        });

        STATE.models.forEach(m => {
            const name = m.description.split(' - ')[0];
            const div = document.createElement('div');
            div.className = 'model-item';
            div.onclick = () => selectModel(m.name, name, div);

            // Tags
            let tags = '';
            if (m.name.includes('search') || m.description.toLowerCase().includes('web search')) tags += '<span class="tag search">Search</span>';
            if (m.tools) tags += '<span class="tag tools">Tools</span>';
            if (m.reasoning) tags += '<span class="tag reasoning">Think</span>';

            div.innerHTML = `<span class="model-name">${name}</span><div class="model-tags">${tags}</div>`;
            c.appendChild(div);
        });

        // Select first
        if (STATE.models.length > 0) {
            const first = c.querySelector('.model-item');
            const m = STATE.models[0];
            selectModel(m.name, m.description.split(' - ')[0], first);
        }
    }

    function selectModel(id, name, el) {
        STATE.current = id;
        document.querySelectorAll('.model-item').forEach(i => i.classList.remove('selected'));
        if (el) el.classList.add('selected');
        document.getElementById('selected-name').innerText = name;
    }

    // Generate
    async function generate() {
        const txt = document.getElementById('prompt').value;
        if (!txt || !STATE.current) return;

        const btn = document.getElementById('send-btn');
        const out = document.getElementById('output');
        const box = document.getElementById('chat-box');
        
        btn.disabled = true;
        btn.innerHTML = '<div class="spinner"></div>';
        out.className = 'output-text cursor';
        out.textContent = '';
        box.scrollTop = 0; // Reset scroll

        const start = STATE.balance;

        try {
            const res = await fetch(`${BASE}/v1/chat/completions`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${STATE.key}` },
                body: JSON.stringify({ model: STATE.current, messages: [{role:"user", content: txt}], stream: true })
            });

            if (!res.ok) throw new Error((await res.json()).error?.message || `Error ${res.status}`);

            const reader = res.body.getReader();
            const dec = new TextDecoder();
            let buf = '';

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                buf += dec.decode(value, { stream: true });
                const lines = buf.split('\n');
                buf = lines.pop();
                for (const line of lines) {
                    if (line.startsWith('data: ')) {
                        const json = line.slice(6);
                        if (json === '[DONE]') continue;
                        try {
                            const d = JSON.parse(json);
                            if (d.choices?.[0]?.delta?.content) {
                                out.textContent += d.choices[0].delta.content;
                                // Auto-scroll alleen als we onderaan zitten (optioneel), nu gewoon altijd voor streaming
                                box.scrollTop = box.scrollHeight;
                            }
                        } catch(e) {}
                    }
                }
            }

            out.className = 'output-text';
            updateBalance(start);

        } catch (e) {
            out.className = 'output-text';
            out.innerHTML = `<span style="color:var(--danger)">Error: ${e.message}</span>`;
        } finally {
            btn.disabled = false;
            btn.innerText = 'Send';
        }
    }

    async function updateBalance(prev) {
        try {
            const res = await fetch(`${BASE}/account/balance`, { headers: { 'Authorization': `Bearer ${STATE.key}` }});
            if (res.ok) {
                const d = await res.json();
                STATE.balance = (typeof d === 'object' && d.balance !== undefined) ? d.balance : d;
                document.getElementById('ui-balance').innerText = STATE.balance.toLocaleString();
                
                const cost = prev - STATE.balance;
                if (cost > 0) {
                    STATE.used += cost;
                    document.getElementById('ui-used').innerText = STATE.used.toLocaleString();
                }
            }
        } catch(e) {}
    }
</script>
</body>
</html>
