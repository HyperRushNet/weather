<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>Traceer Lightbox Pro</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        html, body {
            margin: 0; padding: 0; height: 100%; width: 100%; 
            overflow: hidden; background: #000; 
            display: flex; justify-content: center; align-items: center; 
            touch-action: none; user-select: none; -webkit-user-select: none;
        }
        #bgWrapper {
            position: absolute; width: 100%; height: 100%; 
            display: flex; justify-content: center; align-items: center; 
            overflow: hidden; z-index: 0; cursor: grab;
        }
        #bgImage {
            max-width: 100%; max-height: 100%; 
            object-fit: contain; pointer-events: none; 
            transition: filter .1s; transform-origin: center center;
            will-change: transform;
        }
        /* UI */
        #controls {
            position: fixed; top: 10px; right: 10px; z-index: 15; 
            background: rgba(0,0,0,0.7); padding: 8px; border-radius: 8px; 
            display: flex; gap: 5px; backdrop-filter: blur(5px); 
            border: 1px solid rgba(255,255,255,0.1);
        }
        button {
            background: transparent; border: none; color: #fff; 
            cursor: pointer; padding: 5px; border-radius: 4px; 
            display: flex; align-items: center; justify-content: center; 
            transition: background .2s;
        }
        button:active { background: rgba(255,255,255,0.2); }
        .locked { color: #ff5252; }
        /* Modal */
        #modal {
            display: none; position: fixed; top: 0; left: 0; 
            width: 100%; height: 100%; background: rgba(0,0,0,0.85); 
            z-index: 20; justify-content: center; align-items: center;
        }
        #modalContent {
            background: #222; padding: 20px; border-radius: 12px; 
            width: 90%; max-width: 400px; border: 1px solid #444;
        }
        h3 { color: #fff; margin: 0 0 15px; font-family: sans-serif; }
        input[type=text] {
            width: 100%; padding: 10px; margin-bottom: 10px; 
            box-sizing: border-box; border-radius: 4px; border: 1px solid #444; 
            background: #333; color: #fff;
        }
        label { color: #ccc; font-size: 12px; display: block; margin-bottom: 5px; font-family: sans-serif; }
        input[type=range] { width: 100%; cursor: pointer; margin-bottom: 10px; }
        .btnFull {
            width: 100%; padding: 12px; background: #000; color: #fff;
            border: 1px solid white; border-radius: 4px; cursor: pointer; 
            font-weight: bold; margin-top: 5px;
        }
    </style>
</head>
<body oncontextmenu="event.preventDefault()">

<div id="bgWrapper">
    <img id="bgImage" src="https://designshack.net/wp-content/uploads/placeholder-image-368x247.png" alt="Trace">
</div>

<div id="controls">
    <button id="btnLock" title="Vergrendel"><i data-lucide="unlock"></i></button>
    <button id="btnSettings" title="Instellingen"><i data-lucide="settings"></i></button>
</div>

<div id="modal">
    <div id="modalContent">
        <h3>Instellingen</h3>
        <label>Afbeelding URL</label>
        <input type="text" id="imgUrl" placeholder="Plak URL...">
        <label>Helderheid (<span id="vB">1</span>)</label>
        <input type="range" id="rBright" min="0.2" max="2" step="0.1" value="1">
        <label>Contrast (<span id="vC">1</span>)</label>
        <input type="range" id="rContrast" min="0.5" max="3" step="0.1" value="1">
        <button class="btnFull" id="btnApply">Toepassen</button>
    </div>
</div>

<script>
const $ = s => document.querySelector(s),
      img = $('#bgImage'),
      modal = $('#modal'),
      btnLock = $('#btnLock'),
      btnSet = $('#btnSettings'),
      urlIn = $('#imgUrl'),
      rB = $('#rBright'),
      rC = $('#rContrast'),
      vB = $('#vB'),
      vC = $('#vC'),
      btnApply = $('#btnApply');

lucide.createIcons();

// State
let scale = 1, panX = 0, panY = 0;
let isLock = false, isDrag = false;
let lastX = 0, lastY = 0;
let startDist = 0, startScale = 1;

// Load Saved Data
const sU = localStorage.getItem('t_url'), sB = localStorage.getItem('t_b'), sC = localStorage.getItem('t_c');
if(sU) img.src = sU;
if(sB) { rB.value = sB; vB.textContent = sB; }
if(sC) { rC.value = sC; vC.textContent = sC; }

function updFilter() {
    img.style.filter = `brightness(${rB.value}) contrast(${rC.value})`;
}
updFilter();

function updTransform() {
    // Volgorde: Translate eerst, dan Scale voorkomt "jumping" effecten
    img.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
}

// UI Actions
btnLock.onclick = () => {
    isLock = !isLock;
    btnLock.innerHTML = isLock ? `<i data-lucide="lock" class="locked"></i>` : `<i data-lucide="unlock"></i>`;
    lucide.createIcons();
    if(isLock) isDrag = false;
};

btnSet.onclick = () => { modal.style.display = 'flex'; urlIn.value = img.src; };

btnApply.onclick = () => {
    if(urlIn.value.trim()){
        img.src = urlIn.value.trim();
        localStorage.setItem('t_url', urlIn.value.trim());
    }
    modal.style.display = 'none';
};

rB.oninput = () => { vB.textContent = rB.value; updFilter(); localStorage.setItem('t_b', rB.value); };
rC.oninput = () => { vC.textContent = rC.value; updFilter(); localStorage.setItem('t_c', rC.value); };

// --- VERBETERDE INPUT LOGICA ---

function handleStart(e) {
    if (isLock || e.target.closest('#controls') || e.target.closest('#modal')) return;

    if (e.touches && e.touches.length === 2) {
        // Pinch Zoom Start
        isDrag = false;
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        startDist = Math.sqrt(dx * dx + dy * dy);
        startScale = scale;
    } else {
        // Pan Start (Muis of 1 vinger)
        isDrag = true;
        const p = e.touches ? e.touches[0] : e;
        lastX = p.clientX;
        lastY = p.clientY;
        if(!e.touches) img.parentElement.style.cursor = 'grabbing';
    }
}

function handleMove(e) {
    if (isLock) return;

    if (e.touches && e.touches.length === 2) {
        // Pinch Zooming
        e.preventDefault();
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const newScale = startScale * (dist / startDist);
        scale = Math.max(0.3, Math.min(10, newScale));
        updTransform();
    } else if (isDrag) {
        // Panning
        e.preventDefault();
        const p = e.touches ? e.touches[0] : e;
        const deltaX = p.clientX - lastX;
        const deltaY = p.clientY - lastY;
        
        panX += deltaX;
        panY += deltaY;
        lastX = p.clientX;
        lastY = p.clientY;
        updTransform();
    }
}

function handleEnd() {
    isDrag = false;
    img.parentElement.style.cursor = 'grab';
}

// Event Listeners voor zowel Muis als Touch
document.addEventListener('mousedown', handleStart);
document.addEventListener('mousemove', handleMove);
document.addEventListener('mouseup', handleEnd);

document.addEventListener('touchstart', handleStart, { passive: false });
document.addEventListener('touchmove', handleMove, { passive: false });
document.addEventListener('touchend', handleEnd);

// Wheel Zoom (Multiplicatief voor smoothness)
document.addEventListener('wheel', e => {
    if (isLock) return;
    e.preventDefault();
    const factor = e.deltaY > 0 ? 0.9 : 1.1;
    const newScale = scale * factor;
    scale = Math.max(0.3, Math.min(10, newScale));
    updTransform();
}, { passive: false });

</script>
</body>
</html>
