        @keyframes bounce{0%,100%{opacity:0.3;transform:translateY(0)}50%{opacity:1;transform:translateY(-4px)}}
        @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        @media(max-width:600px){.container{padding-bottom:140px}.input-wrap{padding:12px}}
    </style>

class MarkdownParser{escapeHtml(text){if(!text)return '';const map={'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'};return text.replace(/[&<>"']/g,m=>map[m])}parse(text){if(!text)return '';let result=text;const mathBlocks=[];result=result.replace(/\$\$([\s\S]*?)\$\$/g,(match,math)=>{const index=mathBlocks.length;mathBlocks.push(`\\[${math}\\]`);return `[[MATHBLOCK${index}]]`});result=result.replace(/\$([^\$\n]+?)\$/g,(match,math)=>{const index=mathBlocks.length;mathBlocks.push(`\\(${math}\\)`);return `[[MATHBLOCK${index}]]`});const codeBlocks=[];result=result.replace(/```(\w*)\n([\s\S]*?)(?:```|$)/g,(match,lang,code)=>{const index=codeBlocks.length;codeBlocks.push(this.renderCodeBlock(code||'',lang));return `[[CODEBLOCK${index}]]`});const inlineCodes=[];result=result.replace(/`([^`\n]+)`/g,(match,code)=>{const index=inlineCodes.length;inlineCodes.push(`<code class="inline-code" style="background:rgba(255,255,255,0.1);padding:2px 5px;border-radius:4px;font-size:0.9em;">${this.escapeHtml(code)}</code>`);return `[[INLINECODE${index}]]`});result=this.parseTables(result);result=result.replace(/^###### (.+)$/gm,'<h6>$1</h6>').replace(/^##### (.+)$/gm,'<h5>$1</h5>').replace(/^#### (.+)$/gm,'<h4>$1</h4>').replace(/^### (.+)$/gm,'<h3>$1</h3>').replace(/^## (.+)$/gm,'<h2>$1</h2>').replace(/^# (.+)$/gm,'<h1>$1</h1>');result=this.parseBlockquotes(result);result=result.replace(/^(---|\*\*\*|___)$/gm,'<hr style="border-color:var(--border-subtle);">');result=this.parseLists(result);result=result.replace(/\*\*\*([^*\n]+)\*\*\*/g,'<strong><em>$1</em></strong>').replace(/\*\*([^*\n]+)\*\*/g,'<strong>$1</strong>').replace(/__([^_\n]+)__/g,'<strong>$1</strong>').replace(/\*([^*\n]+)\*/g,'<em>$1</em>').replace(/_([^_\n]+)_/g,'<em>$1</em>');result=result.replace(/~~([^~\n]+)~~/g,'<del>$1</del>');result=result.replace(/!\[([^\]]*)\]\(([^)]+)\)/g,'<img src="$2" alt="$1" style="max-width:100%;border-radius:8px;margin:8px 0;">').replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');result=this.parseParagraphs(result);inlineCodes.forEach((c,i)=>{result=result.replace(`[[INLINECODE${i}]]`,c)});codeBlocks.forEach((c,i)=>{result=result.replace(`[[CODEBLOCK${i}]]`,c)});mathBlocks.forEach((m,i)=>{result=result.replace(`[[MATHBLOCK${i}]]`,m)});return result}renderCodeBlock(code,lang){const language=lang||'code';const safeCode=code.trim();let highlighted=this.escapeHtml(safeCode);try{if(lang&&hljs.getLanguage(lang)){highlighted=hljs.highlight(safeCode,{language:lang}).value}else{highlighted=hljs.highlightAuto(safeCode).value}}catch(e){}return `<div class="code-block"><div class="code-header"><span class="code-lang">${language}</span><button class="act-btn" onclick="copyText(this, \`${encodeURIComponent(safeCode)}\`)" title="Copy code"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg></button></div><div class="code-content"><pre><code class="hljs">${highlighted}</code></pre></div></div>`}parseTables(text){const tableRegex=/^\|(.+)\|\s*\n\|([-:\s|]+)\|\s*\n((?:\|.+\|\s*\n?)+)/gm;return text.replace(tableRegex,(match,headerRow,separatorRow,bodyRows)=>{if(!headerRow||!separatorRow||!bodyRows)return match;const headers=headerRow.split('|').map(h=>h.trim()).filter(h=>h);const aligns=separatorRow.split('|').map(s=>{s=s.trim();if(s.startsWith(':')&&s.endsWith(':'))return 'text-center';if(s.endsWith(':'))return 'text-right';return 'text-left'});const thead='<thead><tr>'+headers.map((h,i)=>`<th class="${aligns[i]||''}">${h}</th>`).join('')+'</tr></thead>';const rows=bodyRows.trim().split('\n').map(row=>{const cells=row.split('|').map(c=>c.trim()).filter(c=>c);return '<tr>'+cells.map((c,i)=>`<td class="${aligns[i]||''}">${c}</td>`).join('')+'</tr>'}).join('');const tbody='<tbody>'+rows+'</tbody>';return `<div class="table-wrapper"><table>${thead}${tbody}</table></div>`})}parseBlockquotes(text){const lines=text.split('\n');let result=[];let inBlockquote=false;let blockquoteContent=[];for(let line of lines){if(line.startsWith('> ')){if(!inBlockquote){inBlockquote=true;blockquoteContent=[]}blockquoteContent.push(line.substring(2))}else{if(inBlockquote){result.push('<blockquote style="border-left:3px solid var(--accent);padding-left:16px;margin:16px 0;color:#a1a1aa;">'+blockquoteContent.join('<br>')+'</blockquote>');inBlockquote=false;blockquoteContent=[]}result.push(line)}}if(inBlockquote)result.push('<blockquote style="border-left:3px solid var(--accent);padding-left:16px;margin:16px 0;color:#a1a1aa;">'+blockquoteContent.join('<br>')+'</blockquote>');return result.join('\n')}parseLists(text){const lines=text.split('\n');let result=[];let inUl=false,inOl=false;let ulItems=[],olItems=[];for(let line of lines){const taskMatch=line.match(/^[\s]*[-*+][\s]+\[( |x)\][\s]+(.+)$/);const ulMatch=line.match(/^[\s]*[-*+][\s]+(.+)$/);const olMatch=line.match(/^[\s]*(\d+)\.[\s]+(.+)$/);if(taskMatch){if(inOl){result.push('<ol>'+olItems.join('')+'</ol>');inOl=false;olItems=[]}if(!inUl){inUl=true;ulItems=[]}const isChecked=taskMatch[1]==='x';const content=taskMatch[2]||'';ulItems.push(`<li class="task-list-item"><input type="checkbox" ${isChecked?'checked':''} disabled> ${content}</li>`)}else if(ulMatch){if(inOl){result.push('<ol>'+olItems.join('')+'</ol>');inOl=false;olItems=[]}if(!inUl){inUl=true;ulItems=[]}ulItems.push(`<li>${ulMatch[1]||''}</li>`)}else if(olMatch){if(inUl){result.push('<ul>'+ulItems.join('')+'</ul>');inUl=false;ulItems=[]}if(!inOl){inOl=true;olItems=[]}olItems.push(`<li>${olMatch[2]||''}</li>`)}else{if(inUl){result.push('<ul>'+ulItems.join('')+'</ul>');inUl=false;ulItems=[]}if(inOl){result.push('<ol>'+olItems.join('')+'</ol>');inOl=false;olItems=[]}result.push(line)}}if(inUl)result.push('<ul>'+ulItems.join('')+'</ul>');if(inOl)result.push('<ol>'+olItems.join('')+'</ol>');return result.join('\n')}parseParagraphs(text){const blocks=text.split(/\n\n+/);return blocks.map(block=>{block=block.trim();if(!block)return '';if(block.match(/^<(h[1-6]|ul|ol|li|blockquote|hr|div|p|pre|code|table)/))return block;if(block.match(/^\[\[CODEBLOCK\d+\]\]$/))return block;return `<p>${block.replace(/\n/g,'<br>')}</p>`}).join('\n')}}

let lastMathjaxRender=0;
function renderMathLive(element){if(!window.MathJax){return}const now=Date.now();if(now-lastMathjaxRender<100){return}lastMathjaxRender=now;MathJax.typesetPromise([element]).catch((err)=>console.log(err))}
async function init(){document.addEventListener('contextmenu',e=>e.preventDefault());document.addEventListener('selectstart',e=>e.preventDefault());try{const stored=localStorage.getItem('gem_v15');if(stored)CHATS=JSON.parse(stored)}catch(e){CHATS=[]}if(!PK){const k=new URLSearchParams(window.location.hash.substring(1)).get('api_key');if(k){localStorage.setItem('pk',k);location.reload()}else{window.location.href=`https://enter.pollinations.ai/authorize?redirect_url=${encodeURIComponent(window.location.href)}`;return}}renderSidebar();updateBalance();const tx=document.getElementById('prompt');tx.addEventListener('input',()=>{tx.style.height='auto';tx.style.height=tx.scrollHeight+'px'});tx.addEventListener('keydown',(e)=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();handleSendOrStop()}})}
function toggleSidebar(){document.body.classList.toggle('sidebar-open')}
async function updateBalance(){try{const r=await fetch(`${API_BASE}/account/balance`,{headers:{'Authorization':`Bearer ${PK}`}});const d=await r.json();document.getElementById('balance').innerText=Math.floor((d.balance||0)*1000).toLocaleString()+' CREDITS'}catch(e){}}
function renderSidebar(){const list=document.getElementById('chat-list');list.innerHTML='';CHATS.forEach(c=>{const el=document.createElement('div');el.className=`chat-item ${c.id===CURRENT_ID?'active':''}`;el.onclick=()=>loadChat(c.id);const title=document.createElement('span');title.className='chat-title';title.innerText=c.title||'New Chat';const delBtn=document.createElement('button');delBtn.className='act-btn';delBtn.onclick=(e)=>deleteChat(c.id,e);delBtn.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" style="width:14px;opacity:0.6"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>`;el.appendChild(title);el.appendChild(delBtn);list.appendChild(el)})}
function loadChat(id){if(isGenerating)return;CURRENT_ID=id;const chat=CHATS.find(x=>x.id===id);if(!chat)return;document.getElementById('welcome').style.display='none';document.getElementById('chat-view').style.display='block';document.getElementById('chat-container').innerHTML='';if(chat.messages&&Array.isArray(chat.messages)){chat.messages.forEach((m,idx)=>{renderMsg(m.role,m.content,idx,true)})}renderSidebar();if(window.innerWidth<1024)document.body.classList.remove('sidebar-open')}
function newChat(){if(isGenerating)return;CURRENT_ID=null;document.getElementById('welcome').style.display='flex';document.getElementById('chat-view').style.display='none';document.getElementById('chat-container').innerHTML='';renderSidebar()}
function deleteChat(id,e){e.stopPropagation();CHATS=CHATS.filter(c=>c.id!==id);localStorage.setItem('gem_v15',JSON.stringify(CHATS));if(CURRENT_ID===id)newChat();else renderSidebar()}
function copyText(btn,enc){navigator.clipboard.writeText(decodeURIComponent(enc));const original=btn.innerHTML;btn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="#7dd3fc" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>';setTimeout(()=>btn.innerHTML=original,2000)}
function startSuggestion(text){document.getElementById('prompt').value=text;handleSendOrStop()}
function renderMsg(role,content,index,isComplete){const isUser=role==='user';const div=document.createElement('div');div.className=`msg ${isUser?'user':'ai'}`;if(isUser){const bubble=document.createElement('div');bubble.className='bubble';bubble.innerText=content||'';div.appendChild(bubble)}else{const body=document.createElement('div');body.className='md-body';if(!isComplete){body.innerHTML='<div class="loader"><span></span><span></span><span></span></div>'}else{body.innerHTML=mdParser.parse(content||'');if(window.MathJax){MathJax.typesetPromise([body]).catch((err)=>console.log(err))}const acts=document.createElement('div');acts.className='actions';acts.innerHTML=`<button class="act-btn" onclick="handleRegen(${index})" title="Regenerate"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg></button><button class="act-btn" onclick="copyText(this, \`${encodeURIComponent(content||'')}\`)" title="Copy"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg></button>`;div.appendChild(acts)}div.insertBefore(body,div.firstChild)}document.getElementById('chat-container').appendChild(div);document.getElementById('chat-view').scrollTop=document.getElementById('chat-view').scrollHeight;return div}
async function handleRegen(index){if(isGenerating)return;const chat=CHATS.find(x=>x.id===CURRENT_ID);if(!chat||!chat.messages)return;chat.messages=chat.messages.slice(0,index);localStorage.setItem('gem_v15',JSON.stringify(CHATS));document.getElementById('chat-container').innerHTML='';chat.messages.forEach((m,idx)=>renderMsg(m.role,m.content,idx,true));streamAI()}
function handleSendOrStop(){if(isGenerating){if(abortController)abortController.abort();return}const input=document.getElementById('prompt');const text=input.value.trim();if(!text)return;input.value='';input.style.height='auto';document.getElementById('welcome').style.display='none';document.getElementById('chat-view').style.display='block';if(!CURRENT_ID){CURRENT_ID=Date.now().toString();CHATS.unshift({id:CURRENT_ID,title:text.substring(0,40),messages:[]});renderSidebar()}const chat=CHATS.find(x=>x.id===CURRENT_ID);if(!chat)return;if(!chat.messages)chat.messages=[];chat.messages.push({role:'user',content:text});renderMsg('user',text,chat.messages.length-1,true);streamAI()}
async function streamAI(){isGenerating=true;const btn=document.getElementById('send-btn');const iconSend=document.getElementById('icon-send');const iconStop=document.getElementById('icon-stop');btn.classList.add('active');iconSend.style.display='none';iconStop.style.display='block';const chat=CHATS.find(x=>x.id===CURRENT_ID);if(!chat)return;const aiDiv=renderMsg('assistant','',chat.messages.length,false);const body=aiDiv.querySelector('.md-body');let full="";abortController=new AbortController();try{const r=await fetch(`${API_BASE}/v1/chat/completions`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${PK}`},body:JSON.stringify({model:"gemini-search",messages:[{role:'system',content:SYS_PROMPT},...chat.messages],stream:true,seed:Math.floor(Math.random()*1000000)}),signal:abortController.signal});const reader=r.body.getReader();const decoder=new TextDecoder();let buffer="";while(true){const{done,value}=await reader.read();if(done)break;buffer+=decoder.decode(value,{stream:true});const lines=buffer.split('\n');buffer=lines.pop();for(const line of lines){if(!line.trim().startsWith('data: '))continue;const data=line.trim().slice(6);if(data==='[DONE]')break;try{const json=JSON.parse(data);const content=json.choices&&json.choices[0]&&json.choices[0].delta&&json.choices[0].delta.content;if(content){full+=content;body.innerHTML=mdParser.parse(full);renderMathLive(body);document.getElementById('chat-view').scrollTop=document.getElementById('chat-view').scrollHeight}}catch(e){}}}if(isTruncated(full)){chat.messages.push({role:'assistant',content:full});full='';chat.messages.push({role:'user',content:'Continue exactly where you left off. Do not repeat text.'});body.innerHTML+='<div style="text-align:center;color:var(--accent);font-size:12px;margin-top:10px">Continuing...</div>';await continueGeneration(chat,body,full)}else{chat.messages.push({role:'assistant',content:full});localStorage.setItem('gem_v15',JSON.stringify(CHATS));updateBalance()}}catch(e){if(e.name==='AbortError'){if(full.length>0){chat.messages.push({role:'assistant',content:full+" [Stopped]"});localStorage.setItem('gem_v15',JSON.stringify(CHATS))}}else{body.innerHTML=`<span style="color:#ef4444">Error: ${e.message}</span>`}}finally{abortController=null;isGenerating=false;btn.classList.remove('active');iconSend.style.display='block';iconStop.style.display='none';if(full.length>0){aiDiv.remove();renderMsg('assistant',full,chat.messages.length-1,true)}}}
function isTruncated(text){if(!text)return false;const codeBlockCount=(text.match(/```/g)||[]).length;if(codeBlockCount%2!==0)return true;const lastChar=text.trim().slice(-1);if(['.','!','?',')','`','"',"'"].includes(lastChar))return false;if(lastChar.match(/[a-zA-Z0-9]/))return true;return false}
async function continueGeneration(chat,body,full){abortController=new AbortController();try{const r=await fetch(`${API_BASE}/v1/chat/completions`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${PK}`},body:JSON.stringify({model:"gemini-search",messages:[{role:'system',content:SYS_PROMPT},...chat.messages],stream:true,seed:Math.floor(Math.random()*1000000)}),signal:abortController.signal});const reader=r.body.getReader();const decoder=new TextDecoder();let buffer="";while(true){const{done,value}=await reader.read();if(done)break;buffer+=decoder.decode(value,{stream:true});const lines=buffer.split('\n');buffer=lines.pop();for(const line of lines){if(!line.trim().startsWith('data: '))continue;const data=line.trim().slice(6);if(data==='[DONE]')break;try{const json=JSON.parse(data);const content=json.choices&&json.choices[0]&&json.choices[0].delta&&json.choices[0].delta.content;if(content){full+=content;body.innerHTML=mdParser.parse(full);renderMathLive(body);document.getElementById('chat-view').scrollTop=document.getElementById('chat-view').scrollHeight}}catch(e){}}}chat.messages[chat.messages.length-1]={role:'assistant',content:full};localStorage.setItem('gem_v15',JSON.stringify(CHATS));updateBalance()}catch(e){console.error(e)}}
init();
</script>
