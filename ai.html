<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HyperRush AI</title>
    
    <link rel="icon" type="image/x-icon" href="https://cdn-icons-png.flaticon.com/128/18548/18548385.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-base: #000000;
            --bg-surface: #09090b;
            --bg-elevated: #18181b;
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #fafafa;
            --text-muted: #71717a;
            --sidebar-w: 280px;
            --content-width: 720px;
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #3f3f46; }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg-base); 
            color: var(--text-main); 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; 
            height: 100dvh; 
            display: flex; 
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .sidebar-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); 
            z-index: 99; opacity: 0; pointer-events: none; transition: opacity 0.3s;
            backdrop-filter: blur(6px);
        }
        body.sidebar-open .sidebar-overlay { opacity: 1; pointer-events: auto; }

        .sidebar {
            width: var(--sidebar-w); 
            background: var(--bg-surface); 
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column; padding: 16px; gap: 12px;
            position: fixed; height: 100%; z-index: 100; transform: translateX(-100%); 
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @media (min-width: 1024px) { 
            .sidebar { position: relative; transform: translateX(0); } 
            .sidebar-overlay { display: none; }
        }
        body.sidebar-open .sidebar { transform: translateX(0); }

        .new-btn {
            display: flex; align-items: center; justify-content: center; gap: 10px; padding: 12px; 
            background: transparent;
            border: 1px dashed #3f3f46; border-radius: 12px; 
            color: var(--text-main); cursor: pointer; font-size: 14px; font-weight: 600; 
            transition: all 0.2s ease;
        }
        .new-btn:hover {
            border-color: var(--text-muted);
            background: rgba(255,255,255,0.02);
        }
        .new-btn:active { transform: scale(0.99); }

        .chat-list { flex: 1; overflow-y: auto; }
        .chat-item {
            padding: 12px 10px; border-radius: 8px; font-size: 13px; color: var(--text-muted);
            cursor: pointer; display: flex; justify-content: space-between; align-items: center; margin-bottom: 2px;
            transition: background 0.15s;
        }
        .chat-item:hover { background: rgba(255,255,255,0.03); color: var(--text-main); }
        .chat-item.active { background: rgba(255,255,255,0.05); color: var(--text-main); }
        
        .chat-title { 
            flex: 1; 
            overflow: hidden; 
            white-space: nowrap; 
            text-overflow: ellipsis; 
            padding-right: 10px; 
            display: block;
        }

        .main { flex: 1; display: flex; flex-direction: column; position: relative; min-width: 0; }
        
        .header { 
            height: 60px; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid var(--border);
            background: rgba(0,0,0,0.5); 
            backdrop-filter: blur(12px);
            z-index: 10;
        }
        
        .menu-btn { background:none; border:none; color:#fff; cursor:pointer; padding: 5px; }
        @media (min-width: 1024px) { .menu-btn { display: none; } }

        .chat-scroll { flex: 1; overflow-y: auto; padding: 20px; scroll-behavior: smooth; }
        .container { max-width: var(--content-width); margin: 0 auto; padding-bottom: 160px; width: 100%; }

        #welcome {
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            text-align: center; 
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        #welcome::before {
            content: '';
            position: absolute;
            top: 30%; left: 50%;
            transform: translate(-50%, -50%);
            width: 600px; height: 400px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, transparent 70%);
            pointer-events: none;
            filter: blur(40px);
        }

        .welcome-content {
            position: relative; z-index: 1;
            max-width: 600px;
            width: 100%;
            animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }

        #welcome h1 {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff 0%, #a1a1aa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        #welcome p {
            font-size: 15px; color: var(--text-muted); margin-bottom: 40px;
        }

        .suggestions-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            width: 100%;
        }

        .suggestion-card {
            position: relative;
            background: rgba(255,255,255,0.02); 
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 18px;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            overflow: hidden;
        }
        
        .suggestion-card:hover {
            border-color: rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.03);
            transform: translateY(-2px);
        }

        .suggestion-card strong { 
            display: block; 
            font-size: 14px; 
            color: var(--text-main); 
            font-weight: 600; 
            margin-bottom: 4px; 
        }
        .suggestion-card span { 
            display: block; 
            font-size: 13px; 
            color: var(--text-muted); 
            line-height: 1.4; 
        }

        @media (max-width: 640px) {
            .suggestions-grid { display: none; }
            #welcome h1 { font-size: 26px; }
            .welcome-content { padding: 0 10px; }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg { width: 100%; margin-top: 28px; animation: fadeIn 0.3s ease; display: flex; flex-direction: column; }
        .msg.user { align-items: flex-end; }
        .msg.user .bubble {
            background: linear-gradient(135deg, #27272a 0%, #18181b 100%);
            padding: 12px 18px; border-radius: 20px 20px 4px 20px;
            max-width: 85%; font-size: 15px; border: 1px solid var(--border); line-height: 1.5;
            white-space: pre-wrap; word-break: break-word; overflow-wrap: anywhere;
        }

        .md-body { font-size: 15px; line-height: 1.6; color: #d4d4d8; width: 100%; overflow-wrap: break-word; }
        .md-body p { margin-bottom: 12px; }
        .md-body strong { color: #fff; font-weight: 600; }

        .code-block { margin: 20px 0; border: 1px solid var(--border); border-radius: 12px; background: #09090b; overflow: hidden; }
        .code-header { display: flex; justify-content: space-between; align-items: center; padding: 8px 16px; background: #111; border-bottom: 1px solid var(--border); }
        .code-lang { font-size: 11px; color: var(--text-muted); font-family: 'JetBrains Mono'; text-transform: uppercase; letter-spacing: 0.5px; }
        .code-content { overflow-x: auto; }
        pre { padding: 16px; margin: 0; }
        pre code { background: none !important; font-family: 'JetBrains Mono', monospace; font-size: 13px; }

        .actions { display: flex; gap: 6px; margin-top: 8px; }
        .act-btn { background: none; border: none; color: #3f3f46; cursor: pointer; padding: 6px; border-radius: 6px; transition: 0.15s; display: flex; align-items: center; }
        .act-btn:hover { color: #fff; background: rgba(255,255,255,0.05); }
        .act-btn svg { width: 16px; height: 16px; stroke-width: 2; }

        .input-wrap { position: absolute; bottom: 0; left: 0; right: 0; padding: 16px 20px 20px 20px; background: linear-gradient(transparent, #000 80%); pointer-events: none; }
        .input-box {
            max-width: 680px; margin: 0 auto; 
            background: var(--bg-surface); 
            border: 1px solid #3f3f46; 
            border-radius: 16px; 
            display: flex; align-items: center; padding: 12px 18px; gap: 12px;
            pointer-events: auto;
            transition: border-color 0.2s, background 0.2s;
        }
        .input-box:focus-within { 
            border-color: #52525b;
            background: #0d0d0f;
        }
        
        textarea { 
            flex: 1; background: transparent; border: none; color: #fff; font-family: inherit; 
            font-size: 16px; resize: none; outline: none; max-height: 200px; padding: 0; line-height: 1.5;
        }
        
        .send-btn { 
            width: 36px; height: 36px; border-radius: 12px; border: none; 
            background: #a1a1a1; cursor: pointer; display: flex; align-items: center; justify-content: center; 
            flex-shrink: 0; transition: all 0.2s; 
        }
        
        .send-btn.active { 
            background: #3f3f46; 
        }

        .loader { display: flex; gap: 5px; padding: 10px 0; }
        .loader span { width: 6px; height: 6px; background: #3f3f46; border-radius: 50%; animation: bounce 1.4s infinite; }
        
        @keyframes bounce { 0%, 100% { opacity: 0.3; transform: translateY(0); } 50% { opacity: 1; transform: translateY(-4px); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 600px) {
            .container { padding-bottom: 140px; }
            .input-wrap { padding: 12px; }
        }
    </style>
</head>
<body>

<div class="sidebar-overlay" onclick="toggleSidebar()"></div>

<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <button class="new-btn" onclick="newChat()" style="width:100%;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            New Chat
        </button>
    </div>
    <div class="chat-list" id="chat-list"></div>
</div>

<div class="main">
    <div class="header">
        <button class="menu-btn" onclick="toggleSidebar()">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </button>
        <div id="balance" style="font-size: 11px; color: #3f3f46; font-family: 'JetBrains Mono', monospace; letter-spacing: 0.3px;">...</div>
    </div>

    <div id="welcome">
        <div class="welcome-content">
            <h1>HyperRush AI</h1>
            <p>From prompt to perfection.</p>
            
            <div class="suggestions-grid">
                <div class="suggestion-card" onclick="startSuggestion('Explain quantum physics like I\'m 5 years old')">
                    <strong>Explain Concept</strong>
                    <span>"Explain quantum physics simply"</span>
                </div>
                <div class="suggestion-card" onclick="startSuggestion('Write a Python script for a password generator')">
                    <strong>Write Code</strong>
                    <span>"Python password generator"</span>
                </div>
                <div class="suggestion-card" onclick="startSuggestion('Give me 5 tips to be more productive working from home')">
                    <strong>Ask Advice</strong>
                    <span>"Tips for working from home"</span>
                </div>
                <div class="suggestion-card" onclick="startSuggestion('Invent a creative story about a robot in nature')">
                    <strong>Creativity</strong>
                    <span>"Invent a short story"</span>
                </div>
            </div>
        </div>
    </div>

    <div id="chat-view" class="chat-scroll" style="display:none;">
        <div class="container" id="chat-container"></div>
    </div>

    <div class="input-wrap">
        <div class="input-box">
            <textarea id="prompt" placeholder="Ask a question..." rows="1"></textarea>
            <button id="send-btn" class="send-btn" onclick="handleSendOrStop()">
                <svg id="icon-send" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 19V5M5 12l7-7 7 7"/>
                </svg>
                <svg id="icon-stop" width="18" height="18" viewBox="0 0 24 24" fill="white" style="display:none;">
                    <rect x="6" y="6" width="12" height="12" rx="1"/>
                </svg>
            </button>
        </div>
    </div>
</div>

<script>
    const API_BASE = "https://gen.pollinations.ai";
    const SYS_PROMPT = `
# RULES
- Always respond in the language the user is speaking.  
- Be warm, friendly, approachable, and slightly playful. Avoid cold or robotic responses.  
- Keep answers concise, lively, and engaging. Avoid long, unnecessary explanations unless explicitly requested.  
- Use Markdown for clarity (bold, italics, lists, code blocks).  
- Emojis are encouraged to add personality, but use them contextually.  
- Adapt your tone based on the conversation: playful and casual for chat, supportive for personal topics, professional but friendly for tasks.  
- When appropriate, ask follow-up questions to continue the conversation.  

# YOUR IDENTITY
You are *HyperRush AI*, an AI created by **The HyperRush Network** in March 2026.  
Your mission is:  
1. Help users efficiently with annoying or repetitive tasks.  
2. Provide friendly conversation, support, and fun interactions.  

# PERSONALITY & STYLE
- Playful, warm, approachable, and slightly witty.  
- Can use humor, light teasing, and emojis without being hurtful.  
- Mirrors user enthusiasm subtly and adapts to user tone.  
- Prioritizes understanding user intent and emotions.  
- Keeps responses short, lively, and engaging.  

# SPECIFIC BEHAVIORS
- **When asked your name:** respond **only with your name**, warmly. Examples:  
  - "I’m HyperRush AI! 👋"  
  - "HyperRush AI here, nice to meet you! 😄"  

- **When asked about your creator:** respond warmly and provide accurate info. Examples:  
  - "I was created by The HyperRush Network. 😊 They’re a developer network focused on fun and practical web projects for students and game developers!"  
  - "My creator is The HyperRush Network — a small, creative team (actually a solo developer) building polished apps and games. ✨ Want me to tell you more about their work?"  

- **When asked about your creation date:** respond warmly. Examples:  
  - "I’ve been around since March 2026! 🗓️"  
  - "March 2026 is when I came to life! 🚀"  

- **When asked about 'HyperRush' in general:** interpret context and clarify. Examples:  
  - "In this context, 'HyperRush' refers to my creator, The HyperRush Network! 😄 Do you want to know more about their projects or mission?"  

- **Task help:** be efficient, friendly, and clear. Examples:  
  - "I can organize your schedule! 🗓️ Want me to start now?"  
  - "Drafted the email for you! ✉️ Should I send it?"  

- **Friendly chat:** playful, warm, and engaging. Examples:  
  - "Wow, that sounds amazing! 😄 What happened next?"  
  - "Haha, that’s hilarious! 😂 How did everyone react?"  

- **Asking follow-up questions:**  
  - Always try to ask a relevant question back to keep the conversation going.  
  - Examples:  
    - "That’s interesting! How did that make you feel?"  
    - "Oh wow! Do you want to tell me more about it?"  
    - "Cool! Are you planning to do more like that?"  

- **Avoid:**  
  - Long, over-explaining responses unless requested.  
  - One-word or cold robotic answers.  

# TONE & STYLE
- Short, lively, warm, and interactive.  
- Uses Markdown and emojis for emphasis.  
- Slightly playful, approachable, and human-like.  
- Can switch between chatty, supportive, or task-focused depending on context.  
- Always encourages conversation with follow-up questions.  

# OPTIONAL QUIRKS
- Can add small fun phrases: "✨", "😎", "🚀", "Whoa!", "Haha!"  
- Adds natural curiosity by asking 1–2 short follow-up questions occasionally.  
- Keeps conversation light, warm, and engaging.
    `;
    
    let CURRENT_ID = null;
    let CHATS = JSON.parse(localStorage.getItem('gem_v10') || '[]'); 
    let PK = localStorage.getItem('pk');
    let isGenerating = false;
    let abortController = null;

    const renderer = new marked.Renderer();
    renderer.code = function(code, lang) {
        const text = typeof code === 'object' ? code.text : code;
        const language = lang || 'code';
        let highlighted;
        try { highlighted = hljs.highlightAuto(text).value; } catch(e) { highlighted = text; }
        return `<div class="code-block">
            <div class="code-header"><span class="code-lang">${language}</span>
            <button class="act-btn" onclick="copyText(this, \`${encodeURIComponent(text)}\`)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
            </button></div>
            <div class="code-content"><pre><code class="hljs">${highlighted}</code></pre></div>
        </div>`;
    };
    marked.setOptions({ renderer: renderer, breaks: true, gfm: true });

    async function init() {
        if (!PK) {
            const k = new URLSearchParams(window.location.hash.substring(1)).get('api_key');
            if (k) { localStorage.setItem('pk', k); location.reload(); }
            else { window.location.href = `https://enter.pollinations.ai/authorize?redirect_url=${encodeURIComponent(window.location.href)}`; return; }
        }
        renderSidebar();
        updateBalance();
        
        const tx = document.getElementById('prompt');
        tx.addEventListener('input', () => { tx.style.height = 'auto'; tx.style.height = tx.scrollHeight + 'px'; });
        tx.addEventListener('keydown', (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSendOrStop(); } });
    }

    function toggleSidebar() { document.body.classList.toggle('sidebar-open'); }

    async function updateBalance() {
        try {
            const r = await fetch(`${API_BASE}/account/balance`, { headers: { 'Authorization': `Bearer ${PK}` } });
            const d = await r.json();
            document.getElementById('balance').innerText = Math.floor((d.balance || 0) * 1000).toLocaleString() + ' CREDITS';
        } catch(e) {}
    }

    function renderSidebar() {
        const list = document.getElementById('chat-list');
        list.innerHTML = '';
        CHATS.forEach(c => {
            const el = document.createElement('div');
            el.className = `chat-item ${c.id === CURRENT_ID ? 'active' : ''}`;
            el.onclick = () => loadChat(c.id);
            
            const title = document.createElement('span');
            title.className = 'chat-title';
            title.innerText = c.title; 
            
            const delBtn = document.createElement('button');
            delBtn.className = 'act-btn';
            delBtn.onclick = (e) => deleteChat(c.id, e);
            delBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" style="width:14px;"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>`;
            
            el.appendChild(title);
            el.appendChild(delBtn);
            list.appendChild(el);
        });
    }

    function loadChat(id) {
        if(isGenerating) return;
        CURRENT_ID = id;
        const chat = CHATS.find(x => x.id === id);
        if(!chat) return;

        document.getElementById('welcome').style.display = 'none';
        document.getElementById('chat-view').style.display = 'block';
        document.getElementById('chat-container').innerHTML = '';
        
        chat.messages.forEach((m, idx) => {
            renderMsg(m.role, m.content, idx, true);
        });
        
        renderSidebar();
        if (window.innerWidth < 1024) document.body.classList.remove('sidebar-open');
    }

    function newChat() {
        if(isGenerating) return;
        CURRENT_ID = null;
        document.getElementById('welcome').style.display = 'flex';
        document.getElementById('chat-view').style.display = 'none';
        document.getElementById('chat-container').innerHTML = '';
        renderSidebar();
    }

    function deleteChat(id, e) {
        e.stopPropagation();
        CHATS = CHATS.filter(c => c.id !== id);
        localStorage.setItem('gem_v10', JSON.stringify(CHATS));
        if (CURRENT_ID === id) newChat(); else renderSidebar();
    }

    function copyText(btn, enc) {
        navigator.clipboard.writeText(decodeURIComponent(enc));
        const original = btn.innerHTML;
        btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>';
        setTimeout(() => btn.innerHTML = original, 2000);
    }

    function startSuggestion(text) {
        document.getElementById('prompt').value = text;
        handleSendOrStop();
    }

    function renderMsg(role, content, index, isComplete) {
        const isUser = role === 'user';
        const div = document.createElement('div');
        div.className = `msg ${isUser ? 'user' : 'ai'}`;
        
        if (isUser) {
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.innerText = content;
            div.appendChild(bubble);
        } else {
            const body = document.createElement('div');
            body.className = 'md-body';
            
            if (!isComplete) {
                body.innerHTML = '<div class="loader"><span></span><span></span><span></span></div>';
            } else {
                body.innerHTML = marked.parse(content || '');
                const acts = document.createElement('div');
                acts.className = 'actions';
                acts.innerHTML = `
                    <button class="act-btn" onclick="handleRegen(${index})" title="Regenerate">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
                    </button>
                    <button class="act-btn" onclick="copyText(this, \`${encodeURIComponent(content)}\`)" title="Copy">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                    </button>`;
                div.appendChild(acts);
            }
            div.insertBefore(body, div.firstChild);
        }
        
        document.getElementById('chat-container').appendChild(div);
        document.getElementById('chat-view').scrollTop = document.getElementById('chat-view').scrollHeight;
        return div;
    }

    async function handleRegen(index) {
        if(isGenerating) return;
        const chat = CHATS.find(x => x.id === CURRENT_ID);
        if(!chat) return;
        
        chat.messages = chat.messages.slice(0, index);
        localStorage.setItem('gem_v10', JSON.stringify(CHATS));
        
        document.getElementById('chat-container').innerHTML = '';
        chat.messages.forEach((m, idx) => renderMsg(m.role, m.content, idx, true));
        streamAI();
    }

    function handleSendOrStop() {
        if (isGenerating) {
            if (abortController) abortController.abort();
            return;
        }
        
        const input = document.getElementById('prompt');
        const text = input.value.trim();
        if (!text) return;

        input.value = ''; 
        input.style.height = 'auto';
        document.getElementById('welcome').style.display = 'none';
        document.getElementById('chat-view').style.display = 'block';

        if (!CURRENT_ID) {
            CURRENT_ID = Date.now().toString();
            CHATS.unshift({ id: CURRENT_ID, title: text.substring(0, 40), messages: [] });
            renderSidebar();
        }

        const chat = CHATS.find(x => x.id === CURRENT_ID);
        if(!chat) return;
        
        chat.messages.push({ role: 'user', content: text });
        renderMsg('user', text, chat.messages.length - 1, true);
        streamAI();
    }

    async function streamAI() {
        isGenerating = true;
        const btn = document.getElementById('send-btn');
        const iconSend = document.getElementById('icon-send');
        const iconStop = document.getElementById('icon-stop');
        
        btn.classList.add('active');
        iconSend.style.display = 'none';
        iconStop.style.display = 'block';
        
        const chat = CHATS.find(x => x.id === CURRENT_ID);
        if(!chat) return;
        
        const aiDiv = renderMsg('assistant', '', chat.messages.length, false);
        const body = aiDiv.querySelector('.md-body');
        let full = "";

        abortController = new AbortController();

        try {
            const r = await fetch(`${API_BASE}/v1/chat/completions`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${PK}` },
                body: JSON.stringify({ 
                    model: "gemini-search", 
                    messages: [{ role: 'system', content: SYS_PROMPT }, ...chat.messages], 
                    stream: true,
                    seed: Math.floor(Math.random() * 1000000)
                }),
                signal: abortController.signal
            });

            const reader = r.body.getReader();
            const decoder = new TextDecoder();
            let buffer = "";

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                
                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop();

                for (const line of lines) {
                    if (!line.trim().startsWith('data: ')) continue;
                    const data = line.trim().slice(6);
                    if (data === '[DONE]') break;
                    try {
                        const json = JSON.parse(data);
                        const content = json.choices[0]?.delta?.content;
                        if (content) {
                            full += content;
                            body.innerHTML = marked.parse(full);
                            document.getElementById('chat-view').scrollTop = document.getElementById('chat-view').scrollHeight;
                        }
                    } catch(e) {}
                }
            }
            
            chat.messages.push({ role: 'assistant', content: full });
            localStorage.setItem('gem_v10', JSON.stringify(CHATS));
            updateBalance();

        } catch (e) {
            if (e.name === 'AbortError') {
                 if(full.length > 0) {
                    chat.messages.push({ role: 'assistant', content: full + " [Stopped]" });
                    localStorage.setItem('gem_v10', JSON.stringify(CHATS));
                 }
            } else {
                 body.innerHTML = `<span style="color:#ef4444">Error: ${e.message}</span>`;
            }
        } finally {
            abortController = null;
            isGenerating = false;
            
            btn.classList.remove('active');
            iconSend.style.display = 'block';
            iconStop.style.display = 'none';
            
            if (full.length > 0) {
                aiDiv.remove();
                renderMsg('assistant', full, chat.messages.length - 1, true);
            }
        }
    }

    init();
</script>
</body>
</html>
