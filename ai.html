<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gemini Workspace</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-base: #000000;
            --bg-surface: #0a0a0a;
            --bg-elevated: #141414;
            --border: rgba(255, 255, 255, 0.1);
            --text-main: #ededed;
            --sidebar-w: 280px;
        }

        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg-base); color: var(--text-main); font-family: 'Inter', sans-serif; height: 100dvh; display: flex; overflow: hidden; }

        .sidebar-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7); 
            z-index: 99; opacity: 0; pointer-events: none; transition: opacity 0.3s;
            backdrop-filter: blur(4px);
        }
        body.sidebar-open .sidebar-overlay { opacity: 1; pointer-events: auto; }

        .sidebar {
            width: var(--sidebar-w); background: var(--bg-surface); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; padding: 16px; gap: 12px;
            position: fixed; height: 100%; z-index: 100; transform: translateX(-100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @media (min-width: 1024px) { 
            .sidebar { position: relative; transform: translateX(0); } 
            .sidebar-overlay { display: none; }
        }
        body.sidebar-open .sidebar { transform: translateX(0); }

        .new-btn {
            display: flex; align-items: center; justify-content: center; gap: 10px; padding: 12px; 
            background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 12px; 
            color: #fff; cursor: pointer; font-size: 14px; font-weight: 500; transition: background 0.2s;
        }

        .chat-list { flex: 1; overflow-y: auto; }
        .chat-item {
            padding: 10px; border-radius: 8px; font-size: 13px; color: #aaa;
            cursor: pointer; display: flex; justify-content: space-between; align-items: center; margin-bottom: 2px;
        }
        .chat-item:hover, .chat-item.active { background: #111; color: #fff; }
        .chat-title { flex: 1; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; padding-right: 10px; }

        .main { flex: 1; display: flex; flex-direction: column; position: relative; min-width: 0; }
        .header { height: 60px; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        
        .menu-btn { background:none; border:none; color:#fff; cursor:pointer; padding: 5px; }
        @media (min-width: 1024px) { .menu-btn { display: none; } }

        .chat-scroll { flex: 1; overflow-y: auto; padding: 10px 20px; scroll-behavior: smooth; }
        .container { max-width: 800px; margin: 0 auto; padding-bottom: 160px; }

        #welcome { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        #welcome h1 { font-size: clamp(20px, 5vw, 28px); font-weight: 500; color: #555; }

        .msg { width: 100%; margin-top: 32px; animation: fadeIn 0.3s ease; display: flex; flex-direction: column; }
        .msg.user { align-items: flex-end; }
        .msg.user .bubble {
            background: #111; padding: 12px 18px; border-radius: 18px 18px 2px 18px;
            max-width: 85%; font-size: 15px; border: 1px solid var(--border); line-height: 1.5;
            /* Verbeterde tekstweergave */
            white-space: pre-wrap;
            word-break: break-word;
            overflow-wrap: anywhere;
        }

        .md-body { font-size: 15px; line-height: 1.6; color: #ccc; width: 100%; overflow-wrap: break-word; }
        .md-body p { margin-bottom: 12px; }

        .code-block { margin: 20px 0; border: 1px solid var(--border); border-radius: 10px; background: #0d0d0d; overflow: hidden; }
        .code-header { display: flex; justify-content: space-between; align-items: center; padding: 8px 16px; background: #161616; border-bottom: 1px solid var(--border); }
        .code-lang { font-size: 11px; color: #888; font-family: 'JetBrains Mono'; text-transform: uppercase; }
        .code-content { overflow-x: auto; }
        pre { padding: 16px; margin: 0; }
        pre code { background: none !important; font-family: 'JetBrains Mono', monospace; font-size: 13px; }

        .actions { display: flex; gap: 8px; margin-top: 10px; }
        .act-btn { background: none; border: none; color: #444; cursor: pointer; padding: 6px; border-radius: 6px; transition: 0.2s; display: flex; align-items: center; }
        .act-btn:hover { color: #fff; background: rgba(255,255,255,0.05); }
        .act-btn svg { width: 16px; height: 16px; stroke-width: 2; }

        .input-wrap { position: absolute; bottom: 0; left: 0; right: 0; padding: 20px; background: linear-gradient(transparent, #000 60%); }
        .input-box {
            max-width: 760px; margin: 0 auto; background: var(--bg-surface); border: 1px solid var(--border);
            border-radius: 24px; display: flex; align-items: flex-end; padding: 10px 16px; gap: 10px;
        }
        textarea { 
            flex: 1; background: transparent; border: none; color: #fff; font-family: inherit; 
            font-size: 16px; resize: none; outline: none; max-height: 200px; padding: 6px 0; line-height: 20px;
        }
        .send-btn { width: 32px; height: 32px; border-radius: 50%; border: none; background: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-bottom: 2px; transition: background 0.2s; }
        .send-btn.active { background: #ff4444; }

        .loader { display: flex; gap: 4px; padding: 15px 0; }
        .loader span { width: 5px; height: 5px; background: #444; border-radius: 50%; animation: bounce 1.4s infinite; }
        @keyframes bounce { 0%, 100% { opacity: 0.3; transform: translateY(0); } 50% { opacity: 1; transform: translateY(-4px); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 600px) {
            .container { padding-bottom: 120px; }
            .input-wrap { padding: 10px; }
        }
    </style>
</head>
<body>

<div class="sidebar-overlay" onclick="toggleSidebar()"></div>

<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <button class="new-btn" onclick="newChat()" style="width:100%;">+ Nieuwe Chat</button>
    </div>
    <div class="chat-list" id="chat-list"></div>
</div>

<div class="main">
    <div class="header">
        <button class="menu-btn" onclick="toggleSidebar()">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </button>
        <div id="balance" style="font-size: 11px; color: #444; font-family: 'JetBrains Mono';">...</div>
    </div>

    <div id="welcome"><h1>Hoe kan ik helpen?</h1></div>

    <div id="chat-view" class="chat-scroll" style="display:none;">
        <div class="container" id="chat-container"></div>
    </div>

    <div class="input-wrap">
        <div class="input-box">
            <textarea id="prompt" placeholder="Stel een vraag..." rows="1"></textarea>
            <button id="send-btn" class="send-btn" onclick="handleSendOrStop()">
                <!-- Send Icon -->
                <svg id="icon-send" width="18" height="18" viewBox="0 0 24 24" fill="black">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                </svg>
                <!-- Stop Icon -->
                <svg id="icon-stop" width="18" height="18" viewBox="0 0 24 24" fill="black" style="display:none;">
                    <rect x="6" y="6" width="12" height="12" rx="1"/>
                </svg>
            </button>
        </div>
    </div>
</div>

<script>
    const API_BASE = "https://gen.pollinations.ai";
    const SYS_PROMPT = "Respond in the language the user is speaking. Be concise without becoming cold. No long unnecessary explanations. Use Markdown. You may use emojis.";
    
    let CURRENT_ID = null;
    let CHATS = JSON.parse(localStorage.getItem('gem_v5') || '[]');
    let PK = localStorage.getItem('pk');
    let isGenerating = false;
    let currentReader = null;

    // Marked Renderer Setup
    const renderer = new marked.Renderer();
    renderer.code = function(code, lang) {
        const text = typeof code === 'object' ? code.text : code;
        const language = lang || 'code';
        let highlighted;
        try { highlighted = hljs.highlightAuto(text).value; } catch(e) { highlighted = text; }
        return `<div class="code-block">
            <div class="code-header"><span class="code-lang">${language}</span>
            <button class="act-btn" onclick="copyText(this, \`${encodeURIComponent(text)}\`)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
            </button></div>
            <div class="code-content"><pre><code class="hljs">${highlighted}</code></pre></div>
        </div>`;
    };
    marked.setOptions({ renderer: renderer, breaks: true, gfm: true });

    async function init() {
        if (!PK) {
            const k = new URLSearchParams(window.location.hash.substring(1)).get('api_key');
            if (k) { localStorage.setItem('pk', k); location.reload(); }
            else { window.location.href = `https://enter.pollinations.ai/authorize?redirect_url=${encodeURIComponent(window.location.href)}`; return; }
        }
        renderSidebar();
        updateBalance();
        
        const tx = document.getElementById('prompt');
        tx.addEventListener('input', () => { tx.style.height = 'auto'; tx.style.height = tx.scrollHeight + 'px'; });
        tx.addEventListener('keydown', (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSendOrStop(); } });
    }

    function toggleSidebar() { document.body.classList.toggle('sidebar-open'); }

    async function updateBalance() {
        try {
            const r = await fetch(`${API_BASE}/account/balance`, { headers: { 'Authorization': `Bearer ${PK}` } });
            const d = await r.json();
            document.getElementById('balance').innerText = Math.floor((d.balance || 0) * 1000).toLocaleString() + ' CREDITS';
        } catch(e) {}
    }

    // Safe Rendering using innerText for titles
    function renderSidebar() {
        const list = document.getElementById('chat-list');
        list.innerHTML = '';
        CHATS.forEach(c => {
            const el = document.createElement('div');
            el.className = `chat-item ${c.id === CURRENT_ID ? 'active' : ''}`;
            
            const title = document.createElement('span');
            title.className = 'chat-title';
            title.innerText = c.title; // InnerText for safety and single line
            title.onclick = () => loadChat(c.id);
            
            const delBtn = document.createElement('button');
            delBtn.className = 'act-btn';
            delBtn.onclick = (e) => deleteChat(c.id, e);
            delBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" style="width:14px;"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>`;
            
            el.appendChild(title);
            el.appendChild(delBtn);
            list.appendChild(el);
        });
    }

    function loadChat(id) {
        if(isGenerating) return;
        CURRENT_ID = id;
        const chat = CHATS.find(x => x.id === id);
        if(!chat) return;

        document.getElementById('welcome').style.display = 'none';
        document.getElementById('chat-view').style.display = 'block';
        document.getElementById('chat-container').innerHTML = '';
        
        chat.messages.forEach((m, idx) => {
            renderMsg(m.role, m.content, idx, true); // true = isComplete
        });
        
        renderSidebar();
        if (window.innerWidth < 1024) document.body.classList.remove('sidebar-open');
    }

    function newChat() {
        if(isGenerating) return;
        CURRENT_ID = null;
        document.getElementById('welcome').style.display = 'flex';
        document.getElementById('chat-view').style.display = 'none';
        document.getElementById('chat-container').innerHTML = '';
        renderSidebar();
    }

    function deleteChat(id, e) {
        e.stopPropagation();
        CHATS = CHATS.filter(c => c.id !== id);
        localStorage.setItem('gem_v5', JSON.stringify(CHATS));
        if (CURRENT_ID === id) newChat(); else renderSidebar();
    }

    function copyText(btn, enc) {
        navigator.clipboard.writeText(decodeURIComponent(enc));
        const original = btn.innerHTML;
        btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="#00ff00" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>';
        setTimeout(() => btn.innerHTML = original, 2000);
    }

    // isComplete: false when streaming, true when loading history or finished
    function renderMsg(role, content, index, isComplete) {
        const isUser = role === 'user';
        const div = document.createElement('div');
        div.className = `msg ${isUser ? 'user' : 'ai'}`;
        
        if (isUser) {
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.innerText = content; // Safe innerText for user input
            div.appendChild(bubble);
        } else {
            const body = document.createElement('div');
            body.className = 'md-body';
            
            if (!isComplete) {
                body.innerHTML = '<div class="loader"><span></span><span></span><span></span></div>';
            } else {
                body.innerHTML = marked.parse(content || '');
                // Only add actions when complete
                const acts = document.createElement('div');
                acts.className = 'actions';
                acts.innerHTML = `
                    <button class="act-btn" onclick="handleRegen(${index})" title="Opnieuw vanaf hier">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
                    </button>
                    <button class="act-btn" onclick="copyText(this, \`${encodeURIComponent(content)}\`)" title="Kopieer bericht">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                    </button>`;
                div.appendChild(acts);
            }
            div.insertBefore(body, div.firstChild);
        }
        
        document.getElementById('chat-container').appendChild(div);
        document.getElementById('chat-view').scrollTop = document.getElementById('chat-view').scrollHeight;
        return div;
    }

    async function handleRegen(index) {
        if(isGenerating) return;
        const chat = CHATS.find(x => x.id === CURRENT_ID);
        if(!chat) return;
        
        chat.messages = chat.messages.slice(0, index);
        localStorage.setItem('gem_v5', JSON.stringify(CHATS));
        
        document.getElementById('chat-container').innerHTML = '';
        chat.messages.forEach((m, idx) => renderMsg(m.role, m.content, idx, true));
        streamAI();
    }

    // Handle Send or Stop logic
    function handleSendOrStop() {
        if (isGenerating) {
            if (currentReader) {
                currentReader.cancel(); // This triggers error in stream loop to finally block
            }
            return;
        }
        
        const input = document.getElementById('prompt');
        const text = input.value.trim();
        if (!text) return;

        input.value = ''; 
        input.style.height = 'auto';
        document.getElementById('welcome').style.display = 'none';
        document.getElementById('chat-view').style.display = 'block';

        if (!CURRENT_ID) {
            CURRENT_ID = Date.now().toString();
            CHATS.unshift({ id: CURRENT_ID, title: text.substring(0, 40), messages: [] });
            renderSidebar();
        }

        const chat = CHATS.find(x => x.id === CURRENT_ID);
        if(!chat) return;
        
        chat.messages.push({ role: 'user', content: text });
        renderMsg('user', text, chat.messages.length - 1, true);
        streamAI();
    }

    async function streamAI() {
        isGenerating = true;
        const btn = document.getElementById('send-btn');
        const iconSend = document.getElementById('icon-send');
        const iconStop = document.getElementById('icon-stop');
        
        // UI State: Loading
        btn.classList.add('active');
        iconSend.style.display = 'none';
        iconStop.style.display = 'block';
        
        const chat = CHATS.find(x => x.id === CURRENT_ID);
        if(!chat) return;
        
        const aiDiv = renderMsg('assistant', '', chat.messages.length, false);
        const body = aiDiv.querySelector('.md-body');
        let full = "";

        try {
            const r = await fetch(`${API_BASE}/v1/chat/completions`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${PK}` },
                body: JSON.stringify({ 
                    model: "gemini-search", 
                    messages: [{ role: 'system', content: SYS_PROMPT }, ...chat.messages], 
                    stream: true,
                    seed: Math.floor(Math.random() * 1000000)
                })
            });

            currentReader = r.body.getReader();
            const decoder = new TextDecoder();
            let buffer = "";

            while (true) {
                const { done, value } = await currentReader.read();
                if (done) break;
                
                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop();

                for (const line of lines) {
                    if (!line.trim().startsWith('data: ')) continue;
                    const data = line.trim().slice(6);
                    if (data === '[DONE]') break;
                    try {
                        const json = JSON.parse(data);
                        const content = json.choices[0]?.delta?.content;
                        if (content) {
                            full += content;
                            body.innerHTML = marked.parse(full);
                            document.getElementById('chat-view').scrollTop = document.getElementById('chat-view').scrollHeight;
                        }
                    } catch(e) {}
                }
            }
            
            chat.messages.push({ role: 'assistant', content: full });
            localStorage.setItem('gem_v5', JSON.stringify(CHATS));
            updateBalance();

        } catch (e) {
            // User stopped or error
            if (e.name === 'AbortError') {
                 if(full.length > 0) {
                    chat.messages.push({ role: 'assistant', content: full + " [Gestopt]" });
                    localStorage.setItem('gem_v5', JSON.stringify(CHATS));
                 }
            } else {
                 body.innerHTML = `<span style="color:#ff5555">Error: ${e.message}</span>`;
            }
        } finally {
            currentReader = null;
            isGenerating = false;
            
            // UI State: Ready
            btn.classList.remove('active');
            iconSend.style.display = 'block';
            iconStop.style.display = 'none';
            
            // Re-render the AI message to add action buttons if needed
            if (full.length > 0) {
                aiDiv.remove();
                renderMsg('assistant', full, chat.messages.length - 1, true);
            }
        }
    }

    init();
</script>
</body>
</html>
