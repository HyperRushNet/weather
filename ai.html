<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gemini Pro Workspace</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-base: #000000;
            --bg-surface: #0a0a0a;
            --bg-elevated: #141414;
            --border-subtle: rgba(255, 255, 255, 0.05);
            --border-default: rgba(255, 255, 255, 0.1);
            --text-primary: #ededed;
            --text-secondary: #a0a0a0;
            --accent-solid: #3b82f6;
            --radius-md: 12px;
            --sidebar-width: 280px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg-base); color: var(--text-primary); font-family: 'Inter', sans-serif; height: 100vh; display: flex; overflow: hidden; }

        /* --- SIDEBAR --- */
        .sidebar {
            width: var(--sidebar-width); background: var(--bg-surface); border-right: 1px solid var(--border-subtle);
            display: flex; flex-direction: column; padding: 16px; gap: 16px;
            position: fixed; height: 100%; z-index: 101; transform: translateX(-100%); transition: transform 0.25s ease;
        }
        @media (min-width: 1024px) { .sidebar { position: relative; transform: translateX(0); } }
        body.sidebar-open .sidebar { transform: translateX(0); }

        .chat-list { flex: 1; overflow-y: auto; margin-top: 10px; }
        .chat-item {
            padding: 10px 12px; border-radius: 8px; font-size: 14px; color: var(--text-secondary);
            cursor: pointer; display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px;
            transition: 0.2s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .chat-item:hover, .chat-item.active { background: var(--bg-elevated); color: #fff; }

        .new-chat-btn {
            display: flex; align-items: center; justify-content: center; gap: 10px; padding: 12px; 
            background: var(--bg-elevated); border: 1px solid var(--border-default); 
            border-radius: var(--radius-md); color: #fff; cursor: pointer; font-weight: 500;
        }

        /* --- MAIN --- */
        .main { flex: 1; display: flex; flex-direction: column; position: relative; min-width: 0; }
        .header {
            padding: 14px 20px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border-subtle); background: rgba(0,0,0,0.8); backdrop-filter: blur(15px); z-index: 10;
        }

        .chat-view { flex: 1; overflow-y: auto; padding: 20px; scroll-behavior: smooth; }
        .chat-container { max-width: 850px; margin: 0 auto; padding-bottom: 150px; }

        /* --- MESSAGES & CODE BOXES --- */
        .message { margin-top: 32px; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .message.user { display: flex; justify-content: flex-end; }
        .message.user .bubble {
            background: #2f2f2f; padding: 12px 20px; border-radius: 20px;
            max-width: 80%; font-size: 15px; line-height: 1.5;
        }

        .markdown-body { font-size: 16px; line-height: 1.7; color: #d1d1d1; }
        .markdown-body p { margin-bottom: 16px; }

        /* De Code Box Styling */
        .code-container {
            margin: 20px 0;
            background: #1e1e1e;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border-default);
        }
        .code-header {
            background: #2d2d2d;
            padding: 8px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .copy-btn {
            background: transparent;
            border: 1px solid #444;
            color: #ccc;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            transition: 0.2s;
        }
        .copy-btn:hover { background: #444; color: #fff; }

        pre[class*="language-"] {
            margin: 0 !important;
            padding: 16px !important;
            background: transparent !important;
            font-size: 14px !important;
            overflow-x: auto;
        }
        code { font-family: 'JetBrains Mono', monospace !important; }

        /* --- INPUT --- */
        .input-area { position: absolute; bottom: 0; left: 0; right: 0; padding: 24px; background: linear-gradient(transparent, var(--bg-base) 40%); }
        .input-box {
            max-width: 800px; margin: 0 auto; background: var(--bg-elevated); border: 1px solid var(--border-default);
            border-radius: 28px; display: flex; align-items: flex-end; padding: 12px 20px; gap: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        textarea {
            flex: 1; background: transparent; border: none; color: #fff; font-family: inherit;
            font-size: 16px; resize: none; outline: none; max-height: 200px; padding: 4px 0; line-height: 1.5;
        }
        .send-btn { 
            width: 40px; height: 40px; border-radius: 50%; border: none; background: #fff; 
            cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: 0.2s;
        }
        .send-btn:hover { transform: scale(1.05); background: #3b82f6; }
        .send-btn svg { fill: #000; }
        .send-btn:hover svg { fill: #fff; }

        .loader { display: flex; gap: 5px; padding: 15px 0; }
        .loader span { width: 8px; height: 8px; background: var(--accent-solid); border-radius: 50%; animation: bounce 1.4s infinite ease-in-out; }
        .loader span:nth-child(2) { animation-delay: 0.2s; }
        .loader span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); opacity: 0.3; } 40% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

<div class="sidebar" id="sidebar">
    <div style="font-size: 11px; font-weight: 700; color: #555; letter-spacing: 1px; margin-bottom: 10px;">HISTORIE</div>
    <button class="new-chat-btn" onclick="newChat()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
        Nieuwe Chat
    </button>
    <div class="chat-list" id="chat-list"></div>
</div>

<div class="main">
    <div class="header">
        <div style="display: flex; align-items: center; gap: 12px;">
            <button class="menu-toggle" onclick="document.body.classList.toggle('sidebar-open')" style="background:none; border:none; color:#fff; cursor:pointer;">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </button>
            <div style="font-weight: 600; font-size: 15px; letter-spacing: 0.5px;">Gemini <span style="color:var(--accent-solid)">Pro</span></div>
        </div>
        <div id="ui-balance" style="font-family: 'JetBrains Mono'; font-size: 12px; color: var(--text-secondary); background: rgba(255,255,255,0.05); padding: 4px 10px; border-radius: 20px;">0 pollen</div>
    </div>

    <div id="welcome-view" style="flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px;">
        <h1 style="font-size: 36px; font-weight: 700; margin-bottom: 15px; background: linear-gradient(90deg, #fff, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Hoe kan ik helpen?</h1>
        <p style="color: var(--text-secondary); max-width: 400px; line-height: 1.6;">Stel een vraag, laat me code schrijven of brainstorm over een nieuw project.</p>
    </div>

    <div id="chat-view" class="chat-view" style="display:none;">
        <div class="chat-container" id="chat-container"></div>
    </div>

    <div class="input-area">
        <div class="input-box">
            <textarea id="prompt" placeholder="Stuur een bericht..." rows="1" onkeydown="if(event.key==='Enter' && !event.shiftKey){event.preventDefault(); handleSend();}"></textarea>
            <button class="send-btn" onclick="handleSend()">
                <svg width="20" height="20" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </div>
    </div>
</div>

<script>
    const BASE = "https://gen.pollinations.ai";
    let CURRENT_CHAT_ID = null;
    let CHATS = JSON.parse(localStorage.getItem('gemini_chats_v2') || '[]');
    let API_KEY = localStorage.getItem('pk');

    // --- Configureer Markdown met Custom Code Rendering ---
    const renderer = new marked.Renderer();
    renderer.code = function(code, language) {
        const validLang = !!(language && Prism.languages[language]);
        const highlighted = validLang ? Prism.highlight(code, Prism.languages[language], language) : code;
        const langLabel = language || 'code';
        
        return `
            <div class="code-container">
                <div class="code-header">
                    <span>${langLabel}</span>
                    <button class="copy-btn" onclick="copyToClipboard(this)">Kopieer</button>
                </div>
                <pre class="language-${language}"><code class="language-${language}">${highlighted}</code></pre>
            </div>`;
    };
    marked.setOptions({ renderer: renderer, breaks: true });

    async function init() {
        if (!API_KEY) {
            const k = new URLSearchParams(window.location.hash.substring(1)).get('api_key');
            if (k) { localStorage.setItem('pk', k); window.location.hash = ''; location.reload(); }
            else { window.location.href = `https://enter.pollinations.ai/authorize?redirect_url=${encodeURIComponent(window.location.href)}&permissions=profile,balance,usage`; return; }
        }
        renderSidebar();
        updateBalance();
        
        document.getElementById('prompt').addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });
    }

    function copyToClipboard(btn) {
        const code = btn.parentElement.nextElementSibling.innerText;
        navigator.clipboard.writeText(code);
        btn.innerText = 'Gekopieerd!';
        setTimeout(() => btn.innerText = 'Kopieer', 2000);
    }

    async function updateBalance() {
        try {
            const r = await fetch(`${BASE}/account/balance`, { headers: { 'Authorization': `Bearer ${API_KEY}` } });
            const d = await r.json();
            document.getElementById('ui-balance').innerText = Math.floor(d.balance || d).toLocaleString('nl-NL') + ' pollen';
        } catch (e) {}
    }

    function renderSidebar() {
        const list = document.getElementById('chat-list');
        list.innerHTML = '';
        CHATS.forEach(c => {
            const item = document.createElement('div');
            item.className = `chat-item ${c.id === CURRENT_CHAT_ID ? 'active' : ''}`;
            item.onclick = () => loadChat(c.id);
            item.innerHTML = `<span>${c.title}</span>`;
            list.appendChild(item);
        });
    }

    function loadChat(id) {
        CURRENT_CHAT_ID = id;
        const chat = CHATS.find(x => x.id === id);
        document.getElementById('welcome-view').style.display = 'none';
        document.getElementById('chat-view').style.display = 'block';
        document.getElementById('chat-container').innerHTML = '';
        chat.messages.forEach(m => renderMessage(m.role, m.content));
        renderSidebar();
    }

    function newChat() {
        CURRENT_CHAT_ID = null;
        document.getElementById('welcome-view').style.display = 'flex';
        document.getElementById('chat-view').style.display = 'none';
        document.getElementById('chat-container').innerHTML = '';
        document.getElementById('prompt').value = '';
        renderSidebar();
    }

    function renderMessage(role, content) {
        const isUser = role === 'user';
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${isUser ? 'user' : 'ai'}`;
        
        if (isUser) {
            msgDiv.innerHTML = `<div class="bubble">${content.replace(/</g, "&lt;")}</div>`;
        } else {
            msgDiv.innerHTML = `<div class="markdown-body">${marked.parse(content)}</div>`;
        }
        
        document.getElementById('chat-container').appendChild(msgDiv);
        const view = document.getElementById('chat-view');
        view.scrollTop = view.scrollHeight;
        return msgDiv;
    }

    async function handleSend() {
        const input = document.getElementById('prompt');
        const text = input.value.trim();
        if (!text) return;

        input.value = '';
        input.style.height = 'auto';

        if (!CURRENT_CHAT_ID) {
            CURRENT_CHAT_ID = Date.now().toString();
            CHATS.unshift({ id: CURRENT_CHAT_ID, title: text.substring(0, 30) + '...', messages: [] });
            document.getElementById('welcome-view').style.display = 'none';
            document.getElementById('chat-view').style.display = 'block';
        }

        const chat = CHATS.find(x => x.id === CURRENT_CHAT_ID);
        chat.messages.push({ role: 'user', content: text });
        renderMessage('user', text);
        
        const aiMsgDiv = renderMessage('assistant', '<div class="loader"><span></span><span></span><span></span></div>');
        const container = aiMsgDiv.querySelector('.markdown-body');

        try {
            const response = await fetch(`${BASE}/v1/chat/completions`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEY}` },
                body: JSON.stringify({ 
                    model: "gemini", 
                    messages: chat.messages, 
                    stream: true 
                })
            });

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let fullText = "";

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                
                const chunk = decoder.decode(value);
                const lines = chunk.split('\n');
                
                for (const line of lines) {
                    if (line.startsWith('data: ')) {
                        const dataStr = line.slice(6);
                        if (dataStr === '[DONE]') break;
                        try {
                            const json = JSON.parse(dataStr);
                            const content = json.choices[0].delta?.content;
                            if (content) {
                                fullText += content;
                                container.innerHTML = marked.parse(fullText);
                                // Scroll mee tijdens het typen
                                document.getElementById('chat-view').scrollTop = document.getElementById('chat-view').scrollHeight;
                            }
                        } catch (e) {}
                    }
                }
            }
            chat.messages.push({ role: 'assistant', content: fullText });
            localStorage.setItem('gemini_chats_v2', JSON.stringify(CHATS));
            updateBalance();
            renderSidebar();
        } catch (e) {
            container.innerHTML = `<span style="color:#ff4a4a">Systeemfout: ${e.message}</span>`;
        }
    }

    init();
</script>
</body>
</html>
