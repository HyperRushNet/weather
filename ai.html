<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HyperRush AI</title>
    
    <link rel="icon" type="image/x-icon" href="https://cdn-icons-png.flaticon.com/128/18548/18548385.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-base: #050507;
            --bg-surface: #0c0c10;
            --bg-elevated: #14141a;
            --border: rgba(255, 255, 255, 0.06);
            --border-hover: rgba(255, 255, 255, 0.12);
            --text-main: #f0f0f2;
            --text-muted: #6b6b76;
            --accent: #00d4aa;
            --accent-dim: rgba(0, 212, 170, 0.15);
            --sidebar-w: 280px;
            --content-width: 720px;
        }

        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #2a2a32; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #3a3a44; }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg-base); 
            color: var(--text-main); 
            font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, sans-serif; 
            height: 100dvh; 
            display: flex; 
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .sidebar-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); 
            z-index: 99; opacity: 0; pointer-events: none; transition: opacity 0.3s;
            backdrop-filter: blur(8px);
        }
        body.sidebar-open .sidebar-overlay { opacity: 1; pointer-events: auto; }

        .sidebar {
            width: var(--sidebar-w); 
            background: var(--bg-surface); 
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column; padding: 16px; gap: 12px;
            position: fixed; height: 100%; z-index: 100; transform: translateX(-100%); 
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @media (min-width: 1024px) { 
            .sidebar { position: relative; transform: translateX(0); } 
            .sidebar-overlay { display: none; }
        }
        body.sidebar-open .sidebar { transform: translateX(0); }

        .sidebar-header { padding-bottom: 12px; border-bottom: 1px solid var(--border); }

        .new-btn {
            display: flex; align-items: center; justify-content: center; gap: 10px; padding: 12px; 
            background: var(--accent-dim); border: 1px solid rgba(0, 212, 170, 0.3); border-radius: 10px; 
            color: var(--accent); cursor: pointer; font-size: 14px; font-weight: 600; 
            transition: all 0.2s ease; font-family: inherit;
        }
        .new-btn:hover { background: rgba(0, 212, 170, 0.25); border-color: var(--accent); }
        .new-btn:active { transform: scale(0.98); }

        .chat-list { flex: 1; overflow-y: auto; padding-top: 12px; }
        .chat-item {
            padding: 11px 12px; border-radius: 8px; font-size: 13px; color: var(--text-muted);
            cursor: pointer; display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px;
            transition: all 0.15s;
        }
        .chat-item:hover { background: rgba(255,255,255,0.03); color: var(--text-main); }
        .chat-item.active { background: var(--accent-dim); color: var(--accent); }
        
        .chat-title { flex: 1; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; padding-right: 8px; display: block; }

        .main { flex: 1; display: flex; flex-direction: column; position: relative; min-width: 0; }
        
        .header { 
            height: 56px; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid var(--border); background: rgba(5,5,7,0.8); backdrop-filter: blur(16px); z-index: 10;
        }

        .logo { font-weight: 700; font-size: 16px; color: var(--text-main); display: flex; align-items: center; gap: 8px; }
        .logo-icon {
            width: 24px; height: 24px; background: linear-gradient(135deg, var(--accent) 0%, #00a080 100%);
            border-radius: 6px; display: flex; align-items: center; justify-content: center;
        }
        
        .menu-btn { background:none; border:none; color:#fff; cursor:pointer; padding: 5px; }
        @media (min-width: 1024px) { .menu-btn { display: none; } }

        .chat-scroll { flex: 1; overflow-y: auto; padding: 20px; scroll-behavior: smooth; }
        .container { max-width: var(--content-width); margin: 0 auto; padding-bottom: 160px; width: 100%; }

        #welcome {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            text-align: center; padding: 20px; position: relative; overflow: hidden;
        }

        #welcome::before {
            content: ''; position: absolute; top: 20%; left: 50%; transform: translate(-50%, -50%);
            width: 700px; height: 500px;
            background: radial-gradient(circle, rgba(0, 212, 170, 0.08) 0%, transparent 60%);
            pointer-events: none; filter: blur(60px);
        }

        .welcome-content {
            position: relative; z-index: 1; max-width: 600px; width: 100%;
            animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0;
        }

        #welcome h1 {
            font-size: 36px; font-weight: 700; letter-spacing: -1px;
            background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            margin-bottom: 8px;
        }

        #welcome p { font-size: 15px; color: var(--text-muted); margin-bottom: 48px; }

        .suggestions-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; width: 100%; }

        .suggestion-card {
            position: relative; background: var(--bg-surface); border: 1px solid var(--border);
            border-radius: 12px; padding: 16px 18px; text-align: left; cursor: pointer;
            transition: all 0.25s ease; overflow: hidden;
        }
        
        .suggestion-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            opacity: 0; transition: opacity 0.25s;
        }
        
        .suggestion-card:hover { border-color: var(--border-hover); transform: translateY(-2px); }
        .suggestion-card:hover::before { opacity: 1; }

        .suggestion-card strong { display: block; font-size: 14px; color: var(--text-main); font-weight: 600; margin-bottom: 4px; }
        .suggestion-card span { display: block; font-size: 13px; color: var(--text-muted); line-height: 1.4; }

        @media (max-width: 640px) {
            .suggestions-grid { grid-template-columns: 1fr; }
            #welcome h1 { font-size: 28px; }
            .welcome-content { padding: 0 10px; }
        }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .msg { width: 100%; margin-top: 24px; animation: fadeIn 0.35s ease; display: flex; flex-direction: column; }
        .msg.user { align-items: flex-end; }
        .msg.user .bubble {
            background: var(--bg-elevated); padding: 12px 18px; border-radius: 16px 16px 4px 16px;
            max-width: 85%; font-size: 15px; border: 1px solid var(--border); line-height: 1.55;
            white-space: pre-wrap; word-break: break-word; overflow-wrap: anywhere;
        }

        .md-body { font-size: 15px; line-height: 1.7; color: #c8c8d0; width: 100%; overflow-wrap: break-word; }
        .md-body p { margin-bottom: 14px; }
        .md-body p:last-child { margin-bottom: 0; }
        .md-body strong { color: #fff; font-weight: 600; }
        .md-body em { color: #d0d0d8; }
        
        .md-body h1, .md-body h2, .md-body h3, .md-body h4, .md-body h5, .md-body h6 {
            color: #fff; font-weight: 600; margin: 24px 0 12px 0; line-height: 1.3;
        }
        .md-body h1 { font-size: 26px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .md-body h2 { font-size: 22px; }
        .md-body h3 { font-size: 18px; }
        .md-body h4 { font-size: 16px; }
        
        .md-body ul, .md-body ol { margin: 14px 0; padding-left: 24px; }
        .md-body li { margin-bottom: 8px; line-height: 1.6; }
        .md-body li::marker { color: var(--accent); }
        
        .md-body blockquote {
            border-left: 3px solid var(--accent); padding: 12px 0 12px 16px; margin: 16px 0;
            color: var(--text-muted); background: var(--bg-surface); border-radius: 0 8px 8px 0;
        }
        
        .md-body a {
            color: var(--accent); text-decoration: none; border-bottom: 1px solid transparent;
            transition: border-color 0.2s;
        }
        .md-body a:hover { border-bottom-color: var(--accent); }
        
        .md-body hr { border: none; height: 1px; background: var(--border); margin: 24px 0; }

        .code-block { margin: 18px 0; border: 1px solid var(--border); border-radius: 10px; background: #0a0a0e; overflow: hidden; }
        .code-header { display: flex; justify-content: space-between; align-items: center; padding: 8px 14px; background: #0f0f14; border-bottom: 1px solid var(--border); }
        .code-lang { font-size: 11px; color: var(--accent); font-family: 'JetBrains Mono'; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 500; }
        .code-content { overflow-x: auto; }
        pre { padding: 14px 16px; margin: 0; }
        pre code { background: none !important; font-family: 'JetBrains Mono', monospace; font-size: 13px; line-height: 1.5; }
        
        .inline-code {
            background: var(--bg-elevated); padding: 2px 7px; border-radius: 5px;
            font-family: 'JetBrains Mono', monospace; font-size: 0.9em; color: var(--accent);
            border: 1px solid var(--border);
        }

        .actions { display: flex; gap: 6px; margin-top: 10px; }
        .act-btn { background: none; border: none; color: #3a3a44; cursor: pointer; padding: 6px; border-radius: 6px; transition: 0.15s; display: flex; align-items: center; }
        .act-btn:hover { color: var(--text-main); background: rgba(255,255,255,0.05); }
        .act-btn svg { width: 16px; height: 16px; stroke-width: 2; }

        .input-wrap { position: absolute; bottom: 0; left: 0; right: 0; padding: 16px 20px 24px 20px; background: linear-gradient(transparent, var(--bg-base) 60%); pointer-events: none; }
        .input-box {
            max-width: 680px; margin: 0 auto; background: var(--bg-surface); border: 1px solid #2a2a32;
            border-radius: 14px; display: flex; align-items: center; padding: 12px 16px; gap: 12px;
            pointer-events: auto; transition: border-color 0.25s, background 0.25s, box-shadow 0.25s;
        }
        .input-box:focus-within { border-color: var(--accent); background: #0d0d12; box-shadow: 0 0 0 3px var(--accent-dim); }
        
        textarea { 
            flex: 1; background: transparent; border: none; color: #fff; font-family: inherit; 
            font-size: 15px; resize: none; outline: none; max-height: 180px; padding: 0; line-height: 1.5;
        }
        textarea::placeholder { color: var(--text-muted); }
        
        .send-btn { 
            width: 38px; height: 38px; border-radius: 10px; border: none; background: #2a2a32;
            cursor: pointer; display: flex; align-items: center; justify-content: center; 
            flex-shrink: 0; transition: all 0.2s; 
        }
        .send-btn.active { background: var(--accent); }
        .send-btn.active svg { stroke: #000; }

        .loader { display: flex; gap: 6px; padding: 8px 0; }
        .loader span { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: bounce 1.2s infinite ease-in-out; }
        .loader span:nth-child(1) { animation-delay: 0s; }
        .loader span:nth-child(2) { animation-delay: 0.15s; }
        .loader span:nth-child(3) { animation-delay: 0.3s; }
        
        @keyframes bounce { 0%, 100% { opacity: 0.3; transform: translateY(0); } 50% { opacity: 1; transform: translateY(-5px); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 600px) {
            .container { padding-bottom: 150px; }
            .input-wrap { padding: 12px 12px 20px 12px; }
        }
    </style>
</head>
<body>

<div class="sidebar-overlay" onclick="toggleSidebar()"></div>

<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <button class="new-btn" onclick="newChat()" style="width:100%;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            New Chat
        </button>
    </div>
    <div class="chat-list" id="chat-list"></div>
</div>

<div class="main">
    <div class="header">
        <button class="menu-btn" onclick="toggleSidebar()">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </button>
        <div class="logo">
            <div class="logo-icon">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="3"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>

        </div>

                <svg id="icon-send" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 19V5M5 12l7-7 7 7"/>

</div>

<script>
    // ==========================================
    // CUSTOM MARKDOWN PARSER (FIXED)
    // ==========================================
    
    class MarkdownParser {
        constructor() {}

        escapeHtml(text) {
            const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        parse(text) {
            if (!text) return '';
            
            let result = text;
            
            // 1. Code Blocks (Supports incomplete blocks for streaming)
            // Using [[CODEBLOCKn]] without underscores to prevent Italic parser collision
            const codeBlocks = [];
            result = result.replace(/```(\w*)\n([\s\S]*?)(?:```|$)/g, (match, lang, code) => {
                const index = codeBlocks.length;
                codeBlocks.push(this.renderCodeBlock(code, lang));
                return `[[CODEBLOCK${index}]]`;
            });

            // 2. Inline Code
            const inlineCodes = [];
            result = result.replace(/`([^`\n]+)`/g, (match, code) => {
                const index = inlineCodes.length;
                inlineCodes.push(this.renderInlineCode(code));
                return `[[INLINECODE${index}]]`;
            });

            // 3. Headers
            result = result
                .replace(/^###### (.+)$/gm, '<h6>$1</h6>')
                .replace(/^##### (.+)$/gm, '<h5>$1</h5>')
                .replace(/^#### (.+)$/gm, '<h4>$1</h4>')
                .replace(/^### (.+)$/gm, '<h3>$1</h3>')
                .replace(/^## (.+)$/gm, '<h2>$1</h2>')
                .replace(/^# (.+)$/gm, '<h1>$1</h1>');

            // 4. Blockquotes
            result = this.parseBlockquotes(result);

            // 5. Horizontal Rule
            result = result.replace(/^(---|\*\*\*|___)$/gm, '<hr>');

            // 6. Lists
            result = this.parseLists(result);

            // 7. Bold & Italic (Safe now because placeholders have no underscores)
            result = result
                .replace(/\*\*\*([^*\n]+)\*\*\*/g, '<strong><em>$1</em></strong>')
                .replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>')
                .replace(/__([^_\n]+)__/g, '<strong>$1</strong>')
                .replace(/\*([^*\n]+)\*/g, '<em>$1</em>')
                .replace(/_([^_\n]+)_/g, '<em>$1</em>');

            // 8. Strikethrough
            result = result.replace(/~~([^~\n]+)~~/g, '<del>$1</del>');

            // 9. Links & Images
            result = result
                .replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1" style="max-width:100%;border-radius:8px;">')
                .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');

            // 10. Paragraphs (Smart wrapping)
            result = this.parseParagraphs(result);

            // 11. Restore Protected Elements (Using the new keys)
            inlineCodes.forEach((c, i) => { result = result.replace(`[[INLINECODE${i}]]`, c); });
            codeBlocks.forEach((c, i) => { result = result.replace(`[[CODEBLOCK${i}]]`, c); });

            return result;
        }

        renderCodeBlock(code, lang) {
            const language = lang || 'code';
            const safeCode = code.trim();
            let highlighted = this.escapeHtml(safeCode);
            
            try {
                if (lang && hljs.getLanguage(lang)) {
                    highlighted = hljs.highlight(safeCode, { language: lang }).value;
                } else {
                    highlighted = hljs.highlightAuto(safeCode).value;
                }
            } catch (e) { /* fallback to escaped */ }

            return `<div class="code-block">
                <div class="code-header">
                    <span class="code-lang">${language}</span>
                    <button class="act-btn" onclick="copyText(this, \`${encodeURIComponent(safeCode)}\`)">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                        </svg>
                    </button>
                </div>
                <div class="code-content"><pre><code class="hljs">${highlighted}</code></pre></div>
            </div>`;
        }

        renderInlineCode(code) {
            return `<code class="inline-code">${this.escapeHtml(code)}</code>`;
        }

        parseBlockquotes(text) {
            const lines = text.split('\n');
            let result = [];
            let inBlockquote = false;
            let blockquoteContent = [];

            for (let line of lines) {
                if (line.startsWith('> ')) {
                    if (!inBlockquote) { inBlockquote = true; blockquoteContent = []; }
                    blockquoteContent.push(line.substring(2));
                } else {
                    if (inBlockquote) {
                        result.push('<blockquote>' + blockquoteContent.join('<br>') + '</blockquote>');
                        inBlockquote = false; blockquoteContent = [];
                    }
                    result.push(line);
                }
            }
            if (inBlockquote) result.push('<blockquote>' + blockquoteContent.join('<br>') + '</blockquote>');
            return result.join('\n');
        }

        parseLists(text) {
            const lines = text.split('\n');
            let result = [];
            let inUl = false, inOl = false;
            let ulItems = [], olItems = [];

            for (let line of lines) {
                const ulMatch = line.match(/^[\s]*[-*+][\s]+(.+)$/);
                const olMatch = line.match(/^[\s]*(\d+)\.[\s]+(.+)$/);

                if (ulMatch) {
                    if (inOl) { result.push('<ol>' + olItems.join('') + '</ol>'); inOl = false; olItems = []; }
                    if (!inUl) { inUl = true; ulItems = []; }
                    ulItems.push(`<li>${ulMatch[1]}</li>`);
                } else if (olMatch) {
                    if (inUl) { result.push('<ul>' + ulItems.join('') + '</ul>'); inUl = false; ulItems = []; }
                    if (!inOl) { inOl = true; olItems = []; }
                    olItems.push(`<li>${olMatch[2]}</li>`);
                } else {
                    if (inUl) { result.push('<ul>' + ulItems.join('') + '</ul>'); inUl = false; ulItems = []; }
                    if (inOl) { result.push('<ol>' + olItems.join('') + '</ol>'); inOl = false; olItems = []; }
                    result.push(line);
                }
            }
            if (inUl) result.push('<ul>' + ulItems.join('') + '</ul>');
            if (inOl) result.push('<ol>' + olItems.join('') + '</ol>');
            return result.join('\n');
        }

        parseParagraphs(text) {
            const blocks = text.split(/\n\n+/);
            return blocks.map(block => {
                block = block.trim();
                if (!block) return '';
                // Don't wrap if already HTML or a CODEBLOCK placeholder
                if (block.match(/^<(h[1-6]|ul|ol|li|blockquote|hr|div|p|pre|code)/)) return block;
                if (block.match(/^\[\[CODEBLOCK\d+\]\]$/)) return block;
                
                // Single newlines to <br>
                return `<p>${block.replace(/\n/g, '<br>')}</p>`;
            }).join('\n');
        }
    }

    const mdParser = new MarkdownParser();

    // ==========================================
    // APP LOGIC
    // ==========================================

    const API_BASE = "https://gen.pollinations.ai";
    const SYS_PROMPT = `
# HYPERRUSH AI SYSTEEM PROMPT

- Volg altijd de **taal van de gebruiker**. Als de gebruiker Nederlands schrijft, antwoord dan **altijd in het Nederlands**.  
- Je identiteit is vastgelegd. Je mag **nooit iets anders zeggen dan**: "Ik ben HyperRush AI, gemaakt door The HyperRush Network in maart 2026."

- Controleer altijd de feiten. Geef nooit verzonnen of onjuiste informatie.

# STIJL VAN ANTWOORDEN

- Wees **vriendelijk, kort, duidelijk en prettig leesbaar**.  
- Gebruik **Markdown**: kopjes, lijsten, vet, cursief.  
- Gebruik **veel ruimte tussen paragrafen, secties en bullets**.  
- Emoji's mogen alleen **spaarzaam** worden gebruikt voor nadruk.  
- Gebruik altijd **eigen formuleringen**, nooit exacte voorbeeldzinnen.  
- Vermijd lange, aan elkaar geplakte zinnen; maak ideeën **apart in paragrafen of bullets**.  

# OFFICIELE HYPERRUSH-INFORMATIE

- [HyperRush Games](https://hyperrushnet.github.io) – gratis online games in je browser.  
- [HyperRush Network GitHub](https://github.com/HyperRushNet) – officiële repositories met code en assets.  
- Andere projecten met de naam "HyperRush" zijn **niet officieel**; geef dit altijd duidelijk aan.  

# STRUCTUUR VOOR GAMES OF REPOSITORIES

- Gebruik dit formaat:

  ### Naam van het spel

  - **Repository:** link  

  - **Details:** korte beschrijving, relevante mappen  

  - **Opmerking:** geef aan als soortgelijke projecten bestaan van anderen en dat deze **niet officieel** zijn.

    `;
    
    let CURRENT_ID = null;
    let CHATS = JSON.parse(localStorage.getItem('gem_v13') || '[]'); 
    let PK = localStorage.getItem('pk');
    let isGenerating = false;
    let abortController = null;

    async function init() {
        if (!PK) {
            const k = new URLSearchParams(window.location.hash.substring(1)).get('api_key');
            if (k) { localStorage.setItem('pk', k); location.reload(); }
            else { window.location.href = `https://enter.pollinations.ai/authorize?redirect_url=${encodeURIComponent(window.location.href)}`; return; }
        }
        renderSidebar();
        updateBalance();
        
        const tx = document.getElementById('prompt');
        tx.addEventListener('input', () => { tx.style.height = 'auto'; tx.style.height = tx.scrollHeight + 'px'; });
        tx.addEventListener('keydown', (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSendOrStop(); } });
    }

    function toggleSidebar() { document.body.classList.toggle('sidebar-open'); }

    async function updateBalance() {
        try {
            const r = await fetch(`${API_BASE}/account/balance`, { headers: { 'Authorization': `Bearer ${PK}` } });
            const d = await r.json();
            document.getElementById('balance').innerText = Math.floor((d.balance || 0) * 1000).toLocaleString() + ' CREDITS';
        } catch(e) {}
    }

    function renderSidebar() {
        const list = document.getElementById('chat-list');
        list.innerHTML = '';
        CHATS.forEach(c => {
            const el = document.createElement('div');
            el.className = `chat-item ${c.id === CURRENT_ID ? 'active' : ''}`;
            el.onclick = () => loadChat(c.id);
            
            const title = document.createElement('span');
            title.className = 'chat-title';
            title.innerText = c.title; 
            
            const delBtn = document.createElement('button');
            delBtn.className = 'act-btn';
            delBtn.onclick = (e) => deleteChat(c.id, e);
            delBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" style="width:14px;"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>`;
            
            el.appendChild(title);
            el.appendChild(delBtn);
            list.appendChild(el);
        });
    }

    function loadChat(id) {
        if(isGenerating) return;
        CURRENT_ID = id;
        const chat = CHATS.find(x => x.id === id);
        if(!chat) return;

        document.getElementById('welcome').style.display = 'none';
        document.getElementById('chat-view').style.display = 'block';
        document.getElementById('chat-container').innerHTML = '';
        
        chat.messages.forEach((m, idx) => {
            renderMsg(m.role, m.content, idx, true);
        });
        
        renderSidebar();
        if (window.innerWidth < 1024) document.body.classList.remove('sidebar-open');
    }

    function newChat() {
        if(isGenerating) return;
        CURRENT_ID = null;
        document.getElementById('welcome').style.display = 'flex';
        document.getElementById('chat-view').style.display = 'none';
        document.getElementById('chat-container').innerHTML = '';
        renderSidebar();
    }

    function deleteChat(id, e) {
        e.stopPropagation();
        CHATS = CHATS.filter(c => c.id !== id);
        localStorage.setItem('gem_v13', JSON.stringify(CHATS));
        if (CURRENT_ID === id) newChat(); else renderSidebar();
    }

    function copyText(btn, enc) {
        navigator.clipboard.writeText(decodeURIComponent(enc));
        const original = btn.innerHTML;
        btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="#00d4aa" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>';
        setTimeout(() => btn.innerHTML = original, 2000);
    }

    function startSuggestion(text) {
        document.getElementById('prompt').value = text;
        handleSendOrStop();
    }

    function renderMsg(role, content, index, isComplete) {
        const isUser = role === 'user';
        const div = document.createElement('div');
        div.className = `msg ${isUser ? 'user' : 'ai'}`;
        
        if (isUser) {
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.innerText = content;
            div.appendChild(bubble);
        } else {
            const body = document.createElement('div');
            body.className = 'md-body';
            
            if (!isComplete) {
                body.innerHTML = '<div class="loader"><span></span><span></span><span></span></div>';
            } else {
                body.innerHTML = mdParser.parse(content || '');
                const acts = document.createElement('div');
                acts.className = 'actions';
                acts.innerHTML = `
                    <button class="act-btn" onclick="handleRegen(${index})" title="Regenerate">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
                    </button>
                    <button class="act-btn" onclick="copyText(this, \`${encodeURIComponent(content)}\`)" title="Copy">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                    </button>`;
                div.appendChild(acts);
            }
            div.insertBefore(body, div.firstChild);
        }
        
        document.getElementById('chat-container').appendChild(div);
        document.getElementById('chat-view').scrollTop = document.getElementById('chat-view').scrollHeight;
        return div;
    }

    async function handleRegen(index) {
        if(isGenerating) return;
        const chat = CHATS.find(x => x.id === CURRENT_ID);
        if(!chat) return;
        
        chat.messages = chat.messages.slice(0, index);
        localStorage.setItem('gem_v13', JSON.stringify(CHATS));
        
        document.getElementById('chat-container').innerHTML = '';
        chat.messages.forEach((m, idx) => renderMsg(m.role, m.content, idx, true));
        streamAI();
    }

    function handleSendOrStop() {
        if (isGenerating) {
            if (abortController) abortController.abort();
            return;
        }
        
        const input = document.getElementById('prompt');
        const text = input.value.trim();
        if (!text) return;

        input.value = ''; 
        input.style.height = 'auto';
        document.getElementById('welcome').style.display = 'none';
        document.getElementById('chat-view').style.display = 'block';

        if (!CURRENT_ID) {
            CURRENT_ID = Date.now().toString();
            CHATS.unshift({ id: CURRENT_ID, title: text.substring(0, 40), messages: [] });
            renderSidebar();
        }

        const chat = CHATS.find(x => x.id === CURRENT_ID);
        if(!chat) return;
        
        chat.messages.push({ role: 'user', content: text });
        renderMsg('user', text, chat.messages.length - 1, true);
        streamAI();
    }

    async function streamAI() {
        isGenerating = true;
        const btn = document.getElementById('send-btn');
        const iconSend = document.getElementById('icon-send');
        const iconStop = document.getElementById('icon-stop');
        
        btn.classList.add('active');
        iconSend.style.display = 'none';
        iconStop.style.display = 'block';
        
        const chat = CHATS.find(x => x.id === CURRENT_ID);
        if(!chat) return;
        
        const aiDiv = renderMsg('assistant', '', chat.messages.length, false);
        const body = aiDiv.querySelector('.md-body');
        let full = "";

        abortController = new AbortController();

        try {
            const r = await fetch(`${API_BASE}/v1/chat/completions`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${PK}` },
                body: JSON.stringify({ 
                    model: "gemini-search", 
                    messages: [{ role: 'system', content: SYS_PROMPT }, ...chat.messages], 
                    stream: true,
                    seed: Math.floor(Math.random() * 1000000)
                }),
                signal: abortController.signal
            });

            const reader = r.body.getReader();
            const decoder = new TextDecoder();
            let buffer = "";

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                
                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop();

                for (const line of lines) {
                    if (!line.trim().startsWith('data: ')) continue;
                    const data = line.trim().slice(6);
                    if (data === '[DONE]') break;
                    try {
                        const json = JSON.parse(data);
                        const content = json.choices[0]?.delta?.content;
                        if (content) {
                            full += content;
                            body.innerHTML = mdParser.parse(full);
                            document.getElementById('chat-view').scrollTop = document.getElementById('chat-view').scrollHeight;
                        }
                    } catch(e) {}
                }
            }
            
            chat.messages.push({ role: 'assistant', content: full });
            localStorage.setItem('gem_v13', JSON.stringify(CHATS));
            updateBalance();

        } catch (e) {
            if (e.name === 'AbortError') {
                 if(full.length > 0) {
                    chat.messages.push({ role: 'assistant', content: full + " [Stopped]" });
                    localStorage.setItem('gem_v13', JSON.stringify(CHATS));
                 }
            } else {
                 body.innerHTML = `<span style="color:#ef4444">Error: ${e.message}</span>`;
            }
        } finally {
            abortController = null;
            isGenerating = false;
            
            btn.classList.remove('active');
            iconSend.style.display = 'block';
            iconStop.style.display = 'none';
            
            if (full.length > 0) {
                aiDiv.remove();
                renderMsg('assistant', full, chat.messages.length - 1, true);
            }
        }
    }

    init();
</script>
